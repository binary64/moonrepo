$schema: "https://moonrepo.dev/schemas/project.json"
language: "node"
layer: "application"
tags:
  - next

tasks:
  lint:
    command: "biome check ."
  type-check:
    command: "tsc --noEmit"
  build:
    command: "next build"
    inputs:
      - "src/**/*"
      - "public/**/*"
      - "next.config.ts"
      - "next-env.d.ts"
      - "tsconfig.json"
    outputs:
      - "out"
  deploy:
    command: "npx vercel@latest deploy --prebuilt --yes --token $VERCEL_TOKEN"
    env:
      VERCEL_PROJECT_ID: "prj_JMx0HhqE6N0aOV4SWW67lM1ezacZ"
    deps:
      - "~:build"
    options:
      runInCI: true
