type: application
language: node

tasks:
  copy-data:
    command: 'cp ../pawpicks-uk/src/_data/products.json ./products.json'
    inputs:
      - '../pawpicks-uk/src/_data/products.json'
    outputs:
      - 'products.json'

  build-image:
    command: 'docker build -t pawpicks-stock-checker .'
    deps:
      - 'copy-data'
    inputs:
      - 'Dockerfile'
      - 'index.js'
      - 'package.json'
      - 'products.json'
