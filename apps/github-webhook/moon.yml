layer: application
language: typescript

tasks:
  build:
    script: 'tsc --noEmit'
    inputs:
      - 'server.ts'
      - 'tsconfig.json'
      - 'package.json'
    outputs: []
    options:
      mergeOutputs: replace

  type-check:
    script: 'tsc --noEmit'
    inputs:
      - 'server.ts'
      - 'tsconfig.json'

  lint:
    script: 'biome check server.ts'
    inputs:
      - 'server.ts'

  start:
    command: npm start
    options:
      persistent: true
