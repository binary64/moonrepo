# https://moonrepo.dev/docs/config/workspace
$schema: "../../.moon/cache/schemas/workspace.json"

language: 'node'
type: 'application'

tasks:
  build:
    command: 'bun run build'
    inputs:
      - 'src/**/*'
      - 'eleventy.config.js'
      - 'package.json'
    outputs:
      - '_site'
  dev:
    command: 'bun run serve'
    local: true
  clean:
    command: 'bun run clean'
