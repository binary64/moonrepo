layer: application
language: typescript

tasks:
  build:
    # Compiles to dist/ — required for docker image and `npm start`
    script: 'tsc'
    inputs:
      - '*.ts'
      - 'tsconfig.json'
      - 'package.json'
    outputs:
      - 'dist/**/*'
    options:
      mergeOutputs: replace

  type-check:
    script: 'tsc --noEmit'
    inputs:
      - '*.ts'
      - 'tsconfig.json'

  lint:
    script: 'biome check server.ts'
    inputs:
      - 'server.ts'
      - 'biome.json'
      - '/biome.json'

  # Drift guard: assert the deployed quick-commands configMap matches the
  # { skill, action } schema server.ts expects (prevents the stale 7-cmd
  # { session, message } regression that PR #354 fixed).
  validate-registry:
    script: 'node validate-registry.mjs'
    inputs:
      - 'validate-registry.mjs'
      - '/infra/manifests/ptt-server/quick-commands-configmap.yaml'

  start:
    command: npm start
    options:
      persistent: true
