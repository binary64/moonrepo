name: ci

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - '*'

jobs:
  proto-plugins:
    name: Validate Proto Plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate plugin TOML schemas
        run: bash scripts/validate-proto-plugins.sh

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0.6.4
        with:
          auto-install: true
      - name: Check Formatting & Linting
        run: moon run :lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0.6.4
        with:
          auto-install: true
      - name: Check Types
        run: moon run :type-check

  liquidsoap-check:
    name: Liquidsoap Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install liquidsoap
        # ubuntu-latest (24.04) ships liquidsoap 2.2.4 via apt — same major.minor
        # as the deployed apps/liquidsoap Dockerfile (FROM ubuntu:24.04 + apt).
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq liquidsoap
          liquidsoap --version | head -1
      - name: Check radio-dj.liq parses
        run: liquidsoap --check apps/liquidsoap/radio-dj.liq

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Trivy vulnerability scanner in fs mode
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          version: 'v0.69.1'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0.6.4
        with:
          auto-install: true
      - name: Build projects
        run: moon run :build

  integration:
    name: Integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, type-check, build, proto-plugins]
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: moonrepo/setup-toolchain@v0.6.4
        with:
          auto-install: true
      - name: Install infra tools
        run: cd infra && proto install
      - run: echo "$HOME/.moon/bin" >> $GITHUB_PATH
      - name: Moon CI
        run: moon ci
      - name: Run infrastructure script
        run: bash run.sh
