name: PawPicks Stock Checker — Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'apps/pawpicks-stock-checker/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_short: ${{ steps.version.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.version // "1.0.0"' apps/pawpicks-stock-checker/package.json)
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION  SHA: $SHA_SHORT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/pawpicks-stock-checker
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/pawpicks-stock-checker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=pawpicks-stock-checker
          cache-to: type=gha,mode=max,scope=pawpicks-stock-checker

      - name: Summary
        run: |
          echo "### 🐾 pawpicks-stock-checker" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  pin:
    name: Pin image tag in CronJob manifest
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    concurrency:
      group: pin-manifests
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update CronJob manifest
        run: |
          SHA_SHORT="${{ needs.build.outputs.sha_short }}"
          MANIFEST="infra/manifests/pawpicks-stock-checker/cronjob.yaml"
          sed -i "s|ghcr.io/${{ github.repository_owner }}/pawpicks-stock-checker:.*|ghcr.io/${{ github.repository_owner }}/pawpicks-stock-checker:${SHA_SHORT}|" "$MANIFEST"
          echo "Pinned to :${SHA_SHORT}"
          grep "image:" "$MANIFEST"

      - name: Commit and push
        run: |
          SHA_SHORT="${{ needs.build.outputs.sha_short }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add infra/manifests/pawpicks-stock-checker/cronjob.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "deploy: pin pawpicks-stock-checker to ${SHA_SHORT} [skip ci]"

          for attempt in 1 2 3; do
            if git push origin master; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt/3) — rebasing..."
            git fetch origin master
            git rebase origin/master
          done

          echo "Push failed after 3 attempts"
          exit 1
