name: Docker Build & Push

on:
  push:
    branches: [master]
    paths:
      - 'apps/*/Dockerfile'
      - 'apps/*/**'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build (e.g. tts-server, lan-bridge). Leave empty for all changed.'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      any_changed: ${{ steps.changes.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect apps with Dockerfile changes
        id: changes
        run: |
          if [ -n "${{ inputs.app }}" ]; then
            # Manual trigger — build specific app
            echo "matrix=[\"${{ inputs.app }}\"]" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Auto-detect: find apps/ dirs with changes since last commit
          CHANGED_APPS=$(git diff --name-only HEAD~1 HEAD -- 'apps/' | \
            grep -oP 'apps/\K[^/]+' | sort -u | while read app; do
              # Only include if app has a Dockerfile
              [ -f "apps/$app/Dockerfile" ] && echo "\"$app\""
            done | paste -sd,)

          if [ -z "$CHANGED_APPS" ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[$CHANGED_APPS]" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Detected apps: [$CHANGED_APPS]"

  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.any_changed == 'true'
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Summary
        run: |
          echo "### 🐳 ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "Pushed \`ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
