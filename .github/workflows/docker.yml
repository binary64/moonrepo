name: Docker Build & Push

on:
  push:
    branches: [master]
    paths:
      - 'apps/*/Dockerfile'
      - 'apps/*/**'
  workflow_dispatch:
    inputs:
      app:
        description: 'App to build (e.g. tts-server). Leave empty for all changed.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  detect:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.changes.outputs.matrix }}
      any_changed: ${{ steps.changes.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect apps with Dockerfile changes
        id: changes
        run: |
          if [ -n "${{ inputs.app }}" ]; then
            echo "matrix=[\"${{ inputs.app }}\"]" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_APPS=$(git diff --name-only HEAD~1 HEAD -- 'apps/' | \
            grep -oP 'apps/\K[^/]+' | sort -u | while read app; do
              [ -f "apps/$app/Dockerfile" ] && echo "\"$app\""
            done | paste -sd,)

          if [ -z "$CHANGED_APPS" ]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=[$CHANGED_APPS]" >> "$GITHUB_OUTPUT"
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
          fi

          echo "Detected apps: [$CHANGED_APPS]"

  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.any_changed == 'true' && (github.ref == 'refs/heads/master' || github.event_name != 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect.outputs.matrix) }}
    outputs:
      image_tags: ${{ steps.meta.outputs.tags }}
      sha_short: ${{ steps.version.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4

      - name: Read app version
        id: version
        run: |
          VERSION=$(jq -r '.version // "0.0.0"' "apps/${{ matrix.app }}/package.json")
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, SHA: $SHA_SHORT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.app }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Summary
        run: |
          echo "### 🐳 ${{ matrix.app }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  pin:
    name: Pin images in manifests
    runs-on: ubuntu-latest
    needs: [detect, build]
    if: needs.detect.outputs.any_changed == 'true' && (github.ref == 'refs/heads/master' || github.event_name != 'workflow_dispatch')
    permissions:
      contents: write
    concurrency:
      group: pin-manifests
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update deployment manifests
        run: |
          SHA_SHORT="${{ needs.build.outputs.sha_short }}"
          APPS='${{ needs.detect.outputs.matrix }}'
          CHANGED=""

          for APP in $(echo "$APPS" | jq -r '.[]'); do
            MANIFEST="infra/manifests/${APP}/deployment.yaml"
            if [ ! -f "$MANIFEST" ]; then
              MANIFEST="infra/manifests/${APP}/cronjob.yaml"
            fi
            if [ ! -f "$MANIFEST" ]; then
              echo "No manifest for ${APP} — skipping"
              continue
            fi

            sed -i "s|ghcr.io/${{ github.repository_owner }}/${APP}:.*|ghcr.io/${{ github.repository_owner }}/${APP}:${SHA_SHORT}|" "$MANIFEST"
            echo "Pinned ${APP} to :${SHA_SHORT}"
            grep "image:" "$MANIFEST"
            CHANGED="${CHANGED} ${APP}"
          done

          echo "pinned_apps=$CHANGED" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          SHA_SHORT="${{ needs.build.outputs.sha_short }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add infra/manifests/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "deploy: pin images to ${SHA_SHORT} [skip ci]

          Apps:${pinned_apps}"

          # Rebase and retry to handle concurrent pushes
          for attempt in 1 2 3; do
            if git push origin master; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt/3) — rebasing..."
            git fetch origin master
            git rebase origin/master
          done

          echo "Push failed after 3 attempts"
          exit 1
