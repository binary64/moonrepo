apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frappe-hrms
  namespace: frappe-hrms
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "hrms.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: frappe-hrms-erpnext
          port: 8080
          weight: 1
