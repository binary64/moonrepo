apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  namespace: istio-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # NodePort (not LoadBalancer): external traffic arrives via the ISP router
    # NAT-forwarding WAN:443 -> NUC:30443 (pinned by 6-pin-gateway-nodeports.yaml),
    # so the gateway programs off node IPs and needs no MetalLB-assigned address.
    # Deliberately no spec.addresses here: hardcoding the home WAN IP (a) leaks it
    # into git, and (b) breaks on every WAN-IP rotation (it has rotated twice).
    networking.istio.io/service-type: NodePort
spec:
  gatewayClassName: istio
  listeners:
  - name: default
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    port: 443
    protocol: HTTPS
    hostname: '*.brandwhisper.cloud'
    tls:
      mode: Terminate
      certificateRefs:
      - name: home-tls
    allowedRoutes:
      namespaces:
        from: All
  - name: https-home
    port: 443
    protocol: HTTPS
    hostname: home.brandwhisper.cloud
    tls:
      mode: Terminate
      certificateRefs:
      - name: home-tls
    allowedRoutes:
      namespaces:
        from: All
  - name: headscale-grpc
    port: 50443
    protocol: TLS
    hostname: headscale.brandwhisper.cloud
    tls:
      mode: Passthrough
    allowedRoutes:
      namespaces:
        from: All
