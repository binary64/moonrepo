apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  namespace: istio-system
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    networking.istio.io/service-type: LoadBalancer
    # Skip in local CI integration — spec.addresses[0].value is a REPLACE_WITH_WAN_IP
    # placeholder that is patched at runtime by the wan-ip-monitor. kubectl apply
    # rejects the placeholder (must be valid ipv4), so we skip this file locally.
    moonrepo.dev/skip-local: "true"
spec:
  gatewayClassName: istio
  addresses:
  - type: IPAddress
    value: "REPLACE_WITH_WAN_IP"
  listeners:
  - name: default
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    port: 443
    protocol: HTTPS
    hostname: '*.brandwhisper.cloud'
    tls:
      mode: Terminate
      certificateRefs:
      - name: home-tls
    allowedRoutes:
      namespaces:
        from: All
  - name: https-home
    port: 443
    protocol: HTTPS
    hostname: home.brandwhisper.cloud
    tls:
      mode: Terminate
      certificateRefs:
      - name: home-tls
    allowedRoutes:
      namespaces:
        from: All
  - name: headscale-grpc
    port: 50443
    protocol: TLS
    hostname: headscale.brandwhisper.cloud
    tls:
      mode: Passthrough
    allowedRoutes:
      namespaces:
        from: All
