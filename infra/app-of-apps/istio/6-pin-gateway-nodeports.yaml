# PostSync hook: pin gateway-istio Service NodePorts to deterministic values.
#
# Why: Istio's Gateway API controller auto-creates the `gateway-istio` Service from the
#      Gateway resource and assigns random nodePorts each time it's recreated.
#      Our ISP router NAT forwards 80/443 to fixed NodePorts on the NUC, so they must
#      be stable across rebuilds.
#
# Pinned NodePorts:
#   - 30080 → port 80   (HTTP, redirects to HTTPS)
#   - 31280 → port 443  (HTTPS) — matches ISP router 443→31280 NAT forward
#   - status-port (15021) and headscale-grpc (50443) left dynamic — not externally exposed.
#
# Router NAT update required after this lands: see PR description.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-nodeport-pin
  namespace: istio-system
  annotations:
    moonrepo.dev/skip-local: "true"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-nodeport-pin
  namespace: istio-system
  annotations:
    moonrepo.dev/skip-local: "true"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-nodeport-pin
  namespace: istio-system
  annotations:
    moonrepo.dev/skip-local: "true"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-nodeport-pin
subjects:
  - kind: ServiceAccount
    name: gateway-nodeport-pin
    namespace: istio-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gateway-nodeport-pin
  namespace: istio-system
  annotations:
    moonrepo.dev/skip-local: "true"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: gateway-nodeport-pin
      restartPolicy: OnFailure
      containers:
        - name: pin
          # alpine/k8s — kubectl on an Alpine base, so it HAS /bin/sh (this hook
          # runs a shell script). NOT registry.k8s.io/kubectl or rancher/kubectl:
          # those are distroless with no shell (exec /bin/sh -> exit 128). And NOT
          # bitnami/kubectl: its versioned tags were purged from Docker Hub.
          # Pinned to the cluster minor (server v1.33.6).
          image: alpine/k8s:1.33.1
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              # Wait up to 60s for the Service to exist (in case Istio is still reconciling)
              SERVICE_FOUND=false
              for i in $(seq 1 30); do
                if kubectl get svc -n istio-system gateway-istio >/dev/null 2>&1; then
                  SERVICE_FOUND=true
                  break
                fi
                echo "Waiting for gateway-istio service... ($i/30)"
                sleep 2
              done

              if [ "$SERVICE_FOUND" = "false" ]; then
                echo "ERROR: gateway-istio service not found after 60s — aborting" >&2
                exit 1
              fi

              # Best-effort, conflict-aware pin. Pins a (port -> desired nodePort)
              # only if it doesn't collide with another Service. Detection uses a
              # server-side dry-run patch: if the desired nodePort is already
              # allocated elsewhere the API rejects it, and we SKIP rather than
              # fail — a failed pin must NOT wedge the whole infra-root sync (this
              # hook silently wedged it for days). External access already works on
              # Istio's dynamic ports; deterministic pinning + a matching router NAT
              # change is a separate decision, tracked outside this hook.
              pin_port() {
                PORTNAME="$1"; PORT="$2"; TARGET="$3"; DESIRED="$4"
                PATCH="spec:
                  ports:
                    - name: $PORTNAME
                      port: $PORT
                      targetPort: $TARGET
                      protocol: TCP
                      nodePort: $DESIRED"
                # Already pinned correctly? Nothing to do.
                CUR=$(kubectl get svc -n istio-system gateway-istio \
                  -o jsonpath="{range .spec.ports[?(@.name=='$PORTNAME')]}{.nodePort}{end}" 2>/dev/null)
                if [ "$CUR" = "$DESIRED" ]; then
                  echo "ok: $PORTNAME already pinned to $DESIRED"
                  return 0
                fi
                # Server dry-run detects nodePort collisions without mutating.
                if ! kubectl patch svc -n istio-system gateway-istio --type=strategic \
                     --dry-run=server --patch "$PATCH" >/dev/null 2>&1; then
                  echo "SKIP: nodePort $DESIRED ($PORTNAME) unavailable (already allocated) — leaving gateway port dynamic" >&2
                  return 0
                fi
                if kubectl patch svc -n istio-system gateway-istio --type=strategic --patch "$PATCH" >/dev/null 2>&1; then
                  echo "pinned $PORTNAME -> $DESIRED"
                else
                  echo "WARN: could not pin $PORTNAME -> $DESIRED (left dynamic)" >&2
                fi
              }

              # NOTE: 'default' (port 80) is intentionally NOT pinned — Istio's
              # dynamic assignment currently lands on 32600, which already matches
              # the ISP router's 80→32600 forward. Leave it dynamic unless it drifts.
              # https is pinned to 31280 to match the router's fixed 443→31280
              # NAT forward (the router config is manual/un-versioned, so the
              # cluster matches the router, not vice-versa).
              pin_port https 443 443 31280

              echo "Current gateway-istio NodePorts:"
              kubectl get svc -n istio-system gateway-istio -o jsonpath='{range .spec.ports[*]}{.name}={.nodePort} {end}{"\n"}'
