# PostSync hook: pin gateway-istio Service NodePorts to deterministic values.
#
# Why: Istio's Gateway API controller auto-creates the `gateway-istio` Service from the
#      Gateway resource and assigns random nodePorts each time it's recreated.
#      Our ISP router NAT forwards 80/443 to fixed NodePorts on the NUC, so they must
#      be stable across rebuilds.
#
# Pinned NodePorts (MUST match the ISP router's port-forward targets):
#   - 32600 → port 80   (HTTP, redirects to HTTPS)
#   - 31280 → port 443  (HTTPS)
#   - status-port (15021) and headscale-grpc (50443) left dynamic — not externally exposed.
#
# NOTE: These values are deliberately set to the router's EXISTING forward targets
#       (verified live 2026-06-08: router NAT 80→32600, 443→31280) so no router change
#       is needed and external access never blips. The router admin UI is not remotely
#       reachable (SOCKS/VXLAN limitation), so the hook conforms to the router, not vice
#       versa. If the router forwards ever change, update these two values to match.
#
# Image: rancher/kubectl (distroless, no shell) — so this Job invokes kubectl directly
#        via argv rather than a shell script. PostSync runs only after the sync is
#        healthy, so gateway-istio already exists; no wait-loop needed.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-nodeport-pin
  namespace: istio-system
  annotations:
    moonrepo.dev/skip-local: "true"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-nodeport-pin
  namespace: istio-system
  annotations:
    moonrepo.dev/skip-local: "true"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-nodeport-pin
  namespace: istio-system
  annotations:
    moonrepo.dev/skip-local: "true"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-nodeport-pin
subjects:
  - kind: ServiceAccount
    name: gateway-nodeport-pin
    namespace: istio-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gateway-nodeport-pin
  namespace: istio-system
  annotations:
    moonrepo.dev/skip-local: "true"
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: gateway-nodeport-pin
      restartPolicy: OnFailure
      containers:
        - name: pin
          image: rancher/kubectl:v1.32.0
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            # rancher/kubectl is distroless with a read-only root fs; give kubectl a
            # writable HOME for its cache so it doesn't fail trying to write to /.
            - name: HOME
              value: /tmp
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          # Strategic merge patch: only updates the named ports, leaves others untouched.
          command:
            - kubectl
          args:
            - patch
            - svc
            - -n
            - istio-system
            - gateway-istio
            - --type=strategic
            - --patch
            - |
              spec:
                ports:
                  - name: default
                    port: 80
                    targetPort: 80
                    protocol: TCP
                    nodePort: 32600
                  - name: https
                    port: 443
                    targetPort: 443
                    protocol: TCP
                    nodePort: 31280
