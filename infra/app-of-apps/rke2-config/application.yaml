apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rke2-config
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: default
  source:
    repoURL: https://github.com/binary64/moonrepo.git
    path: infra/manifests/rke2-config
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
