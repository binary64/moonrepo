apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    # NOTE: chart repo migrated bitnami-labs -> bitnami org (2025); GitHub Pages
    # does not redirect, so the old bitnami-labs URL hard-404s. See
    # github.com/bitnami/sealed-secrets/issues/1982
    repoURL: https://bitnami.github.io/sealed-secrets/
    targetRevision: "2.17.9"
    chart: sealed-secrets
    helm:
      releaseName: sealed-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m