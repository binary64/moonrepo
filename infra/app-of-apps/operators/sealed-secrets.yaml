apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    # 2026-06-17: Bitnami retired the bitnami-labs.github.io Pages helm index (now 404s,
    # breaking Integration CI on every PR). The official chart simply moved hosts to
    # bitnami.github.io. Same chart, same versions: 2.17.9 -> controller appVersion 0.33.1
    # (matches the live running controller image exactly — no version bump, no key rotation).
    repoURL: https://bitnami.github.io/sealed-secrets/
    targetRevision: "2.17.9"
    chart: sealed-secrets
    helm:
      releaseName: sealed-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m