apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    # NOTE: the canonical GitHub Pages helm repo (https://bitnami-labs.github.io/sealed-secrets/)
    # is intermittently returning 404 for index.yaml, which breaks `helm repo add` in CI's
    # Integration job (and any fresh ArgoCD helm fetch). The gh-pages branch raw content is the
    # exact same chart index (charts resolve to GitHub Releases tgz) and is reliably reachable,
    # so we point at it directly to keep CI/sync green. Revert to the Pages URL if it recovers.
    repoURL: https://raw.githubusercontent.com/bitnami-labs/sealed-secrets/gh-pages
    targetRevision: "2.17.9"
    chart: sealed-secrets
    helm:
      releaseName: sealed-secrets

  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m