apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    moonrepo.dev/skip-local: "true"
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    targetRevision: "1.19.2"
    chart: cert-manager
    helm:
      releaseName: cert-manager-crds
      values: |
        crds:
          enabled: true
        # Disable all controllers - we only want the CRDs
        replicaCount: 0
        serviceAccount:
          create: false
        prometheus:
          enabled: false
        # Disable webhook entirely — the main cert-manager release owns the webhook.
        # With replicaCount: 0, this release creates a webhook service with no endpoints,
        # causing startupapicheck to CrashLoop. The rapid pod restarts thrash Calico
        # cali* interfaces and trigger network outages (projectcalico/calico#11016).
        webhook:
          replicaCount: 0
          mutatingWebhookConfiguration:
            enabled: false
          validatingWebhookConfiguration:
            enabled: false
        cainjector:
          replicaCount: 0
        startupapicheck:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
      - RespectIgnoreDifferences=true
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    