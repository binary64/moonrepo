apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wealthfolio
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/binary64/moonrepo.git
    targetRevision: master
    path: infra/manifests/wealthfolio
  destination:
    server: https://kubernetes.default.svc
    namespace: wealthfolio
  ignoreDifferences:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      jsonPointers:
        - /status
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
