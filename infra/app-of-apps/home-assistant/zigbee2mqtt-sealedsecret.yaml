# SealedSecret backing zigbee2mqtt's secret.yaml (mounted at /app/data/secret.yaml
# via statefulset.secrets.name). Replaces the plaintext mqtt password, frontend
# auth_token and Zigbee network_key that previously lived in the helm values.
# network_key here is the REAL active mesh key (verified == coordinator key
# e70861a68a260924249b6f33bed3d30e) so resolving !secret keeps all devices paired.
# Closes the secret-stripping gap that commit 679574a opened but never completed.
# Sealed against the live sealed-secrets controller; round-trip verified before commit.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: zigbee2mqtt-secrets
  namespace: home-assistant
spec:
  encryptedData:
    secret.yaml: 
  template:
    metadata:
      name: zigbee2mqtt-secrets
      namespace: home-assistant
