apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  sources:
  - repoURL: https://pajikos.github.io/home-assistant-helm-chart/
    chart: home-assistant
    targetRevision: 0.3.51
    helm:
      values: "additionalMounts:\n- mountPath: /run/dbus\n  name: dbus\n  readOnly:\
        \ true\nadditionalVolumes:\n- hostPath:\n    path: /run/dbus\n  name: dbus\n\
        addons:\n  codeserver:\n    enabled: false\nconfiguration:\n  configuration.yaml:\
        \ \"mqtt:\\n  broker: mosquitto.home-assistant.svc.cluster.local\\n  port:\
        \ 1883\\n  username: mqtt\\n  password: mqtt\\n  discovery: true\\n  discovery_prefix:\
        \ homeassistant\\n  birth_message:\\n    topic: 'hass/status'\\n    payload:\
        \ 'online'\\n  will_message:\\n    topic: 'hass/status'\\n    payload: 'offline'\\\
        n\\nhomeassistant:\\n  auth_provider:\\n    - type: oidc\\n      id: authentik\\\
        n      issuer: !env_var AUTHENTIK_ISSUER\\n      client_id: !env_var AUTHENTIK_CLIENT_ID\\\
        n      client_secret: !env_var AUTHENTIK_CLIENT_SECRET\\n      name: Authentik\\\
        n\"\n  enabled: true\n  forceInit: false\n  trusted_proxies:\n  - 10.42.0.0/16\n\
        \  - 10.43.0.0/16\n  - 127.0.0.0/8\n  - 192.168.1.0/24\nenvFrom:\n- secretRef:\n\
        \    name: home-env\ningress:\n  annotations:\n    kubernetes.io/ingress.class:\
        \ istio\n  className: istio\n  enabled: false\n  external: true\n  hosts:\n\
        \  - host: home.brandwhisper.cloud\n    paths:\n    - path: /\n      pathType:\
        \ Prefix\ninitContainers:\n- command:\n  - sh\n  - -c\n  - \"set -e\\napk\
        \ add --no-cache wget unzip jq > /dev/null 2>&1\\n# HACS\\nif [ ! -d /config/custom_components/hacs\
        \ ]; then\\n  echo \\\"Installing HACS...\\\"\\n  wget -qO /tmp/hacs.zip https://github.com/hacs/integration/releases/latest/download/hacs.zip\\\
        n  mkdir -p /config/custom_components/hacs\\n  unzip -o /tmp/hacs.zip -d /config/custom_components/hacs\\\
        n  rm /tmp/hacs.zip\\nfi\\n# Bermuda BLE Trilateration\\nif [ ! -d /config/custom_components/bermuda\
        \ ]; then\\n  echo \\\"Installing Bermuda...\\\"\\n  BERMUDA_VER=$(wget -qO-\
        \ https://api.github.com/repos/agittins/bermuda/releases/latest | jq -r .tag_name)\\\
        n  wget -qO /tmp/bermuda.zip \\\"https://github.com/agittins/bermuda/releases/download/${BERMUDA_VER}/bermuda.zip\\\
        \"\\n  mkdir -p /config/custom_components/bermuda\\n  unzip -o /tmp/bermuda.zip\
        \ -d /config/custom_components/bermuda\\n  rm /tmp/bermuda.zip\\nfi\\necho\
        \ \\\"Custom components ready.\\\"\\n\"\n  image: alpine:3.21\n  name: init-custom-components\n\
        \  volumeMounts:\n  - mountPath: /config\n    name: home-assistant\npersistence:\n\
        \  accessMode: ReadWriteOnce\n  enabled: true\n  size: 10Gi\npodAnnotations:\n\
        \  container.apparmor.security.beta.kubernetes.io/home-assistant: unconfined\n\
        probes:\n  liveness:\n    enabled: true\n    initialDelaySeconds: 60\n  readiness:\n\
        \    enabled: true\n    initialDelaySeconds: 60\n  startup:\n    enabled:\
        \ true\n    failureThreshold: 30\n    periodSeconds: 10\nsecurityContext:\n\
        \  capabilities:\n    add:\n    - NET_ADMIN\n    - NET_RAW\nservice:\n  port:\
        \ 8123\n  type: ClusterIP\n"
  - repoURL: https://github.com/binary64/moonrepo.git
    targetRevision: master
    path: infra/app-of-apps/home-assistant/home-secret
    directory: {}
