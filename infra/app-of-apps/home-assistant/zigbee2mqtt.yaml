apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zigbee2mqtt
  namespace: argocd
  annotations:
    moonrepo.dev/skip-local: "true"
spec:
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jqPathExpressions:
        - .spec.volumeClaimTemplates[]?.spec.volumeMode
        - .spec.volumeClaimTemplates[]?.status
    - group: ""
      kind: Service
      jqPathExpressions:
        - .spec.ports[]?.nodePort
  project: default
  source:
    repoURL: https://charts.zigbee2mqtt.io/
    targetRevision: "2.11.0"
    chart: zigbee2mqtt
    helm:
      releaseName: zigbee2mqtt
      values: |
        zigbee2mqtt:
          frontend:
            # Secrets resolved at runtime from the mounted secret.yaml (SealedSecret
            # zigbee2mqtt-secrets) via z2m's !secret syntax — no plaintext in git.
            auth_token: '!secret frontend_token'

          mqtt:
            server: 'mqtt://mosquitto:1883'
            # z2m reads `user`, NOT `username` — `username` is silently ignored and
            # falls through to anonymous login → broker rejects (Not authorized).
            # See Koenkk/zigbee2mqtt#25607 and the chart's own values.yaml (`user:`).
            user: mqtt
            password: '!secret mqtt_password'

          serial:
            adapter: ember
            port: /dev/ttyUSB0

          advanced:
            # Real active Zigbee network key (== coordinator key) sealed in
            # zigbee2mqtt-secrets. Resolving !secret yields the SAME key, so the
            # 15 paired devices stay bonded — do NOT inline this as plaintext.
            network_key: '!secret network_key'
            pan_id: 31237
            channel: 25
            log_level: info

        service:
          type: NodePort
          port: 8080

        statefulset:
          # Mount the SealedSecret-backed Secret as /app/data/secret.yaml so the
          # !secret references above resolve at z2m startup.
          secrets:
            name: zigbee2mqtt-secrets

          podAnnotations:
            traffic.sidecar.istio.io/excludeOutboundPorts: "1883"

          storage:
            enabled: true
            size: 10Gi
            storageClassName: local-path

          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 600Mi

          podSecurityContext:
            runAsUser: 0
            runAsGroup: 0

          securityContext:
            privileged: true

          volumes:
            - name: zigbee-usb
              hostPath:
                path: /dev/serial/by-id/usb-SMLIGHT_SMLIGHT_SLZB-07Mg24_fa2c7763f172ed118d9e75773dbf42d5-if00-port0

          volumeMounts:
            - name: zigbee-usb
              mountPath: /dev/ttyUSB0

  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
