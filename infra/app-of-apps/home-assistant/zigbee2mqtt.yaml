apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zigbee2mqtt
  namespace: argocd
  annotations:
    moonrepo.dev/skip-local: 'true'
spec:
  ignoreDifferences:
  - group: apps
    kind: StatefulSet
    jqPathExpressions:
    - .spec.volumeClaimTemplates[]?.spec.volumeMode
    - .spec.volumeClaimTemplates[]?.status
  - group: ''
    kind: Service
    jqPathExpressions:
    - .spec.ports[]?.nodePort
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  sources:
  - repoURL: https://charts.zigbee2mqtt.io/
    chart: zigbee2mqtt
    targetRevision: 2.9.1
    helm:
      releaseName: zigbee2mqtt
      values: "zigbee2mqtt:\n  frontend:\n    auth_token: KGabURkzkattsvLD5u3iDefsBELCGQ5uduqKWYMJ\n\
        \n  mqtt:\n    server: 'mqtt://mosquitto:1883'\n    username: mqtt\n    password:\
        \ mqtt\n\n  serial:\n    adapter: ember\n    port: /dev/ttyUSB0\n\n  advanced:\n\
        \    network_key:\n      - 231\n      - 8\n      - 97\n      - 166\n     \
        \ - 138\n      - 38\n      - 9\n      - 36\n      - 36\n      - 155\n    \
        \  - 111\n      - 51\n      - 190\n      - 211\n      - 211\n      - 14\n\
        \    pan_id: 31237\n    channel: 25\n    log_level: info\n\nservice:\n  type:\
        \ NodePort\n  port: 8080\n\nstatefulset:\n  podAnnotations:\n    traffic.sidecar.istio.io/excludeOutboundPorts:\
        \ \"1883\"\n\n  storage:\n    enabled: true\n    size: 10Gi\n    storageClassName:\
        \ local-path\n\n  resources:\n    requests:\n      cpu: 25m\n      memory:\
        \ 128Mi\n    limits:\n      cpu: 200m\n      memory: 600Mi\n\n  podSecurityContext:\n\
        \    runAsUser: 0\n    runAsGroup: 0\n\n  securityContext:\n    privileged:\
        \ true\n\n  volumes:\n    - name: zigbee-usb\n      hostPath:\n        path:\
        \ /dev/serial/by-id/usb-SMLIGHT_SMLIGHT_SLZB-07Mg24_fa2c7763f172ed118d9e75773dbf42d5-if00-port0\n\
        \n  volumeMounts:\n    - name: zigbee-usb\n      mountPath: /dev/ttyUSB0\n"
  - repoURL: https://github.com/binary64/moonrepo.git
    targetRevision: master
    path: infra/app-of-apps/home-assistant/zigbee-secret
    directory: {}
