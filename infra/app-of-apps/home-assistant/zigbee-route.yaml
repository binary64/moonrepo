# zigbee2mqtt frontend UI, exposed behind authentik (same pattern as mqttui).
# Auth is enforced gateway-wide by the authentik-ext-auth CUSTOM AuthorizationPolicy
# in istio-system, whose host allowlist already includes zigbee.brandwhisper.cloud.
# This route is the missing piece — the z2m frontend (svc port 8080) was running
# but unreachable. The *.brandwhisper.cloud listener is sectionName "https".
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zigbee2mqtt
  namespace: home-assistant
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "zigbee.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: zigbee2mqtt
          port: 8080
          weight: 1
