# HTTPRoute for ESPHome Dashboard via Istio gateway.
# HTTPS is required for Web Serial API (USB flashing in Chrome).
# Hostname: esphome.brandwhisper.cloud
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: esphome
  namespace: esphome
spec:
  parentRefs:
  - name: gateway
    namespace: istio-system
  hostnames:
  - "esphome.brandwhisper.cloud"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: esphome
      port: 6052
