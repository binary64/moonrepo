apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mgmt-dashboard
  namespace: mgmt-dashboard
spec:
  parentRefs:
    - name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "mgmt.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mgmt-dashboard
          port: 3000
