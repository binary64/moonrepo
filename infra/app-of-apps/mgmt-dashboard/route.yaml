apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mgmt-dashboard
  namespace: mgmt-dashboard
spec:
  hostnames:
    - "mgmt.brandwhisper.cloud"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  rules:
    - backendRefs:
        - name: mgmt-dashboard
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: "/"
