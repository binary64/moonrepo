# https://artifacthub.io/packages/helm/newrelic/nri-bundle
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: newrelic
  namespace: argocd
  annotations:
    # Requires licenseKeySecret which isn't available in CI
    moonrepo.dev/skip-local: "true"
spec:
  project: default

  source:
    repoURL: https://helm-charts.newrelic.com
    chart: nri-bundle
    targetRevision: 6.0.32
    helm:
      releaseName: newrelic
      values: |
        global:
          cluster: binary64
          customSecretName: newrelic-secret
          customSecretLicenseKey: licenseKey
          lowDataMode: true

        # --------------------------------
        # Infrastructure Agent (DaemonSet)
        # nri-bundle V3 requires per-component resources
        # --------------------------------
        newrelic-infrastructure:
          enabled: true
          kubelet:
            resources:
              requests:
                cpu: 50m
                memory: 96Mi
              limits:
                cpu: 200m
                memory: 256Mi
          ksm:
            resources:
              requests:
                cpu: 50m
                memory: 96Mi
              limits:
                cpu: 200m
                memory: 256Mi
          controlPlane:
            resources:
              requests:
                cpu: 50m
                memory: 96Mi
              limits:
                cpu: 200m
                memory: 256Mi

        # --------------------------------
        # Kube State Metrics
        # --------------------------------
        kube-state-metrics:
          enabled: true

        # --------------------------------
        # Logging (disabled — was causing ~45GB/day ingest via Fluent Bit)
        # --------------------------------
        newrelic-logging:
          enabled: false

        # --------------------------------
        # Metadata Injection
        # --------------------------------
        nri-metadata-injection:
          enabled: true

        # --------------------------------
        # Kubernetes Events (disabled — noisy, not needed for home cluster)
        # --------------------------------
        nri-kube-events:
          enabled: false

        # --------------------------------
        # Prometheus Scraping (disabled — significant data volume)
        # --------------------------------
        nri-prometheus:
          enabled: false

        # --------------------------------
        # Pixie (explicitly disabled)
        # --------------------------------
        pixie-chart:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: newrelic

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
