apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: start-page
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/binary64/moonrepo.git
    targetRevision: HEAD
    path: infra/manifests/start-page

  destination:
    server: https://kubernetes.default.svc
    namespace: start-page

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
