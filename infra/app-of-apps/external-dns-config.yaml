# External-DNS configuration (SealedSecret for home network IP).
#
# Provides the home public IP as a Kubernetes secret so external-dns can use
# --default-targets via an env var instead of requiring per-HTTPRoute target
# annotations.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/binary64/moonrepo.git
    targetRevision: master
    path: infra/manifests/external-dns
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: external-dns
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
    retry:
      limit: -1
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
  # The home-network Secret's .data is owned at runtime by the wan-ip-monitor
  # CronJob (it patches public-ip on WAN IP change). Ignore data drift so ArgoCD
  # selfHeal does not revert the live IP back to the git seed value.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: home-network
      namespace: external-dns
      jsonPointers:
        - /data
