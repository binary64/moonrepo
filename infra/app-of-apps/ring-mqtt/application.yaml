apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ring-mqtt
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/binary64/moonrepo.git
    path: infra/manifests/ring-mqtt
    targetRevision: HEAD

  destination:
    server: https://kubernetes.default.svc
    namespace: ring-mqtt

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
