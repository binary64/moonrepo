apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: doorbell-chime
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/binary64/moonrepo.git
    path: infra/manifests/doorbell-chime
    targetRevision: HEAD

  destination:
    server: https://kubernetes.default.svc
    namespace: doorbell-chime

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
