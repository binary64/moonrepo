apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hasura
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/binary64/moonrepo.git
    targetRevision: master
    path: infra/manifests/hasura
  destination:
    server: https://kubernetes.default.svc
    namespace: hasura
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
