apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Multi-source: chart from upstream git + our values from git + raw manifests (CNPG cluster)
  sources:
    # 1. LiteLLM Helm chart pulled directly from BerriAI's git repo.
    #    The published Helm repo (berriai.github.io/litellm) has a broken index —
    #    it references a tgz that returns 404.  Pulling from git is more reliable.
    - repoURL: https://github.com/BerriAI/litellm.git
      targetRevision: v1.82.3-stable
      path: deploy/charts/litellm-helm
      helm:
        valueFiles:
          - $values/infra/helm-values/litellm/values.yaml

    # 2. Values file reference (our git)
    - repoURL: https://github.com/binary64/moonrepo.git
      targetRevision: master
      ref: values

    # 3. Raw manifests: CNPG Cluster only
    #    (Deployment + Service come from Helm; HTTPRoute + hooks ConfigMap via extraResources)
    - repoURL: https://github.com/binary64/moonrepo.git
      targetRevision: master
      path: infra/manifests/litellm

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: litellm-env
      namespace: litellm
      managedFieldsManagers:
        - kubectl-client-side-apply
        - kubectl-create
      jsonPointers:
        - /data
        - /stringData

  destination:
    server: https://kubernetes.default.svc
    namespace: litellm

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
