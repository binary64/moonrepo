apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  # Multi-source: official Helm chart + git values file + raw manifests (CNPG cluster)
  sources:
    # 1. Official LiteLLM Helm chart with values from git
    - repoURL: https://berriai.github.io/litellm
      chart: litellm-helm
      targetRevision: "0.2.3"
      helm:
        valueFiles:
          - $values/infra/helm-values/litellm/values.yaml

    # 2. Values file reference (git)
    - repoURL: https://github.com/binary64/moonrepo.git
      targetRevision: master
      ref: values

    # 3. Raw manifests: CNPG Cluster only
    #    (Deployment + Service come from Helm; HTTPRoute + hooks ConfigMap via extraResources)
    - repoURL: https://github.com/binary64/moonrepo.git
      targetRevision: master
      path: infra/manifests/litellm

  ignoreDifferences:
    - group: ""
      kind: Secret
      name: litellm-env
      namespace: litellm
      managedFieldsManagers:
        - kubectl-client-side-apply
        - kubectl-create
      jsonPointers:
        - /data
        - /stringData

  destination:
    server: https://kubernetes.default.svc
    namespace: litellm

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
