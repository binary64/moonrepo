apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: litellm
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  - repoURL: https://github.com/BerriAI/litellm.git
    targetRevision: v1.82.3-stable.patch.2
    path: deploy/charts/litellm-helm
    helm:
      valueFiles:
      - $values/infra/helm-values/litellm/values.yaml
  - repoURL: https://github.com/binary64/moonrepo.git
    targetRevision: master
    ref: values
  - repoURL: https://github.com/binary64/moonrepo.git
    targetRevision: master
    path: infra/manifests/litellm
  - repoURL: https://github.com/binary64/moonrepo.git
    targetRevision: master
    path: infra/app-of-apps/litellm
    directory: {}
  ignoreDifferences:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    jqPathExpressions:
    - .status
  destination:
    server: https://kubernetes.default.svc
    namespace: litellm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true
    - SkipDryRunOnMissingResource=true
    retry:
      limit: -1
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
