apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale
  namespace: headscale
  annotations:
    # DNS is managed via DNSEndpoint CRD (infra/app-of-apps/headscale/dns-endpoint.yaml)
    # rather than route-level annotations, because external-dns v0.15.0 reads the target
    # annotation from the Gateway object only — not from HTTPRoute/TLSRoute resources.
    # Setting controller=ignore prevents the gateway source generating a duplicate record.
    external-dns.alpha.kubernetes.io/controller: "ignore"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "headscale.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /web
      backendRefs:
        - group: ""
          kind: Service
          name: headscale-ui
          port: 80
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: headscale
          port: 8080
          weight: 1
