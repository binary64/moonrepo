apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale
  namespace: headscale
  annotations:
    # Tailscale's Noise protocol is incompatible with Cloudflare proxying.
    # headscale must resolve directly to Jupiter (158.220.90.28), not via the
    # home network IP, and must NOT be orange-clouded.
    external-dns.alpha.kubernetes.io/target: "158.220.90.28"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "headscale.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /web
      backendRefs:
        - group: ""
          kind: Service
          name: headscale-ui
          port: 80
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: headscale
          port: 8080
          weight: 1
