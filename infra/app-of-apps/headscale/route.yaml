apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale
  namespace: headscale
  annotations:
    # DNS for headscale-ui.brandwhisper.cloud is managed by external-dns via this HTTPRoute
    # (gateway-httproute source → home IP via --default-targets).
    #
    # headscale.brandwhisper.cloud (the Tailscale/gRPC API endpoint) is intentionally NOT
    # listed here — it is exclusively managed by the DNSEndpoint CRD in dns-endpoint.yaml
    # which points to 158.220.90.28 (Jupiter VPS). Keeping the two hostnames separate
    # prevents the gateway-httproute source from racing the CRD source over the API record.
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "headscale-ui.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /web
      backendRefs:
        - group: ""
          kind: Service
          name: headscale-ui
          port: 80
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: headscale
          port: 8080
          weight: 1
