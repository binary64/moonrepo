apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale
  namespace: headscale
  annotations:
    moonrepo.dev/skip-local: "true"
    # DNS for headscale-ui.brandwhisper.cloud is managed by external-dns via this HTTPRoute
    # (gateway-httproute source → NUC home IP via --default-targets).
    #
    # headscale.brandwhisper.cloud (the Tailscale/gRPC API endpoint) is intentionally kept
    # separate — managed by the DNSEndpoint CRD in dns-endpoint.yaml pointing to Jupiter
    # (158.220.90.28). Keeping hostnames separate prevents the gateway-httproute source from
    # racing the CRD source and overwriting the API record with the wrong IP.
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "headscale-ui.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: headscale-ui
          port: 80
          weight: 1
