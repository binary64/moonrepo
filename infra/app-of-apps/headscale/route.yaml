apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headscale
  namespace: headscale
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "headscale.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /web
      backendRefs:
        - group: ""
          kind: Service
          name: headscale-ui
          port: 80
          weight: 1
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: headscale
          port: 8080
          weight: 1
