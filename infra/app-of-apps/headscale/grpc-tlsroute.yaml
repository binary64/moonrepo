apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: headscale-grpc
  namespace: headscale
  annotations:
    # Keep gRPC route consistent: DNS-only, pointing at Jupiter directly.
    external-dns.alpha.kubernetes.io/target: "158.220.90.28"
    external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: headscale-grpc
  hostnames:
    - "headscale.brandwhisper.cloud"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: headscale
          port: 50443
          weight: 1
