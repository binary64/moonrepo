apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: headscale-grpc
  namespace: headscale
  annotations:
    # DNS is managed via DNSEndpoint CRD (infra/app-of-apps/headscale/dns-endpoint.yaml).
    # external-dns v0.15.0 ignores the target annotation on TLSRoute resources (reads it
    # only from the Gateway object).  Setting controller=ignore stops the gateway source
    # generating a conflicting record with the wrong IP.
    external-dns.alpha.kubernetes.io/controller: "ignore"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: headscale-grpc
  hostnames:
    - "headscale.brandwhisper.cloud"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: headscale
          port: 50443
          weight: 1
