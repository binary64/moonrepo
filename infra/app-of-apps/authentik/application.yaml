apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
  annotations:
    moonrepo.dev/skip-local: "true"
spec:
  project: default

  # Multi-source: Helm chart from upstream + values + branding ConfigMap from our git
  sources:
    # 1. Authentik Helm chart
    - repoURL: https://charts.goauthentik.io
      targetRevision: "2025.10.3"
      chart: authentik
      helm:
        releaseName: authentik
        valueFiles:
          - $values/infra/helm-values/authentik/values.yaml

    # 2. Values file reference (our git)
    - repoURL: https://github.com/binary64/moonrepo.git
      targetRevision: master
      ref: values

    # 3. Branding ConfigMap (must be in ArgoCD render scope to be deployed)
    - repoURL: https://github.com/binary64/moonrepo.git
      targetRevision: master
      path: infra/app-of-apps/authentik/branding

  destination:
    server: https://kubernetes.default.svc
    namespace: authentik

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
