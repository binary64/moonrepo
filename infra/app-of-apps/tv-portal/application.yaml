apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tv-portal
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/binary64/moonrepo.git
    path: infra/manifests/tv-portal
    targetRevision: HEAD

  destination:
    server: https://kubernetes.default.svc
    namespace: tv-portal

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
