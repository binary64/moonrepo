apiVersion: v1
kind: Namespace
metadata:
  name: hermes-system
  labels:
    app.kubernetes.io/name: hermes
    app.kubernetes.io/part-of: hermes
    app.kubernetes.io/managed-by: argocd
  annotations:
    # Honoured by bash run.sh / local tooling (checks annotations, not labels).
    moonrepo.dev/skip-local: "true"
    # Bootstrap/prerequisite wave — must exist before any Deployment or
    # SealedSecret in this namespace is applied.
    argocd.argoproj.io/sync-wave: "-2"
