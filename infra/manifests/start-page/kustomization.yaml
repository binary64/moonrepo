apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - deployment.yaml
  - healthproxy-deployment.yaml
  - service.yaml
  - route.yaml

configMapGenerator:
  - name: start-page-html
    namespace: start-page
    files:
      - index.html
    options:
      disableNameSuffixHash: true
  - name: start-page-nginx
    namespace: start-page
    files:
      - default.conf=nginx.conf
    options:
      disableNameSuffixHash: true
  - name: start-page-healthproxy
    namespace: start-page
    files:
      - healthproxy.py
    options:
      disableNameSuffixHash: true
