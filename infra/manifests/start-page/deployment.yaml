apiVersion: apps/v1
kind: Deployment
metadata:
  name: start-page
  namespace: start-page
  labels:
    app: start-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: start-page
  template:
    metadata:
      labels:
        app: start-page
    spec:
      nodeSelector:
        kubernetes.io/hostname: vmi3137202
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            periodSeconds: 10
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
              readOnly: true
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
            limits:
              memory: 32Mi
              cpu: 50m
        # Health proxy sidecar — probes LAN/k8s services server-side (TCP connect)
        # and serves results as same-origin JSON via nginx /healthz. See healthproxy.py.
        - name: healthproxy
          image: python:3.12-alpine
          command: ["python3", "/app/healthproxy.py"]
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /livez
              port: 8080
            periodSeconds: 15
          volumeMounts:
            - name: healthproxy-src
              mountPath: /app
              readOnly: true
          resources:
            requests:
              memory: 24Mi
              cpu: 10m
            limits:
              memory: 64Mi
              cpu: 100m
      volumes:
        - name: html
          configMap:
            name: start-page-html
        - name: nginx-conf
          configMap:
            name: start-page-nginx
        - name: healthproxy-src
          configMap:
            name: start-page-healthproxy
