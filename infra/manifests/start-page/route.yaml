apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: start-page
  namespace: start-page
spec:
  hostnames:
    - "start.brandwhisper.cloud"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  rules:
    - backendRefs:
        - name: start-page
          port: 80
      matches:
        - path:
            type: PathPrefix
            value: "/"
