apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: start-page
  namespace: start-page
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "start.brandwhisper.cloud"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: start-page
          port: 80
          weight: 1
