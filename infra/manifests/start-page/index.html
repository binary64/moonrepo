<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Centre</title>
  <style>
    :root {
      --bg: #07070b;
      --panel: rgba(255,255,255,0.025);
      --panel-hover: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.16);
      --text: #e7ecf3;
      --text-dim: #7d8694;
      --text-faint: #4a525e;
      --accent: #6ee7ff;
      --accent-2: #a78bfa;
      --up: #34d399;
      --down: #f87171;
      --unknown: #64748b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 1.6rem clamp(1rem, 4vw, 3rem) 4rem;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated gradient mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(45rem 45rem at 12% -8%, rgba(110,231,255,0.10), transparent 60%),
        radial-gradient(40rem 40rem at 105% 0%, rgba(167,139,250,0.12), transparent 55%),
        radial-gradient(50rem 50rem at 50% 120%, rgba(52,211,153,0.06), transparent 60%);
      animation: drift 26s ease-in-out infinite alternate;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(ellipse 80% 70% at 50% 30%, #000 40%, transparent 100%);
    }
    @keyframes drift {
      0%   { transform: translate3d(0,0,0) scale(1); }
      100% { transform: translate3d(0,-2%,0) scale(1.08); }
    }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1.5rem;
      max-width: 1280px;
      margin: 0 auto 1.4rem;
      flex-wrap: wrap;
    }
    .greeting h1 {
      font-size: clamp(1.5rem, 3.5vw, 2.3rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(120deg, #fff 20%, var(--accent) 60%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.05;
    }
    .greeting p {
      color: var(--text-dim);
      font-size: 0.82rem;
      margin-top: 0.35rem;
      font-variant-numeric: tabular-nums;
    }
    .clock {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .clock .time {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1;
    }
    .clock .date {
      color: var(--text-dim);
      font-size: 0.78rem;
      margin-top: 0.3rem;
    }

    /* Stat strip */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.7rem;
      max-width: 1280px;
      margin: 0 auto 1.6rem;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.85rem 1rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }
    .stat .label {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-faint);
      font-weight: 600;
    }
    .stat .value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 0.25rem;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .stat .sub { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.1rem; }
    .stat .value.good { color: var(--up); }
    .stat .value.bad { color: var(--down); }

    /* Search */
    .searchwrap {
      max-width: 1280px;
      margin: 0 auto 1.4rem;
      position: relative;
    }
    #search {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.85rem 1rem 0.85rem 2.8rem;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      backdrop-filter: blur(12px);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #search:focus {
      border-color: rgba(110,231,255,0.5);
      box-shadow: 0 0 0 4px rgba(110,231,255,0.08);
    }
    #search::placeholder { color: var(--text-faint); }
    .searchwrap .s-icon {
      position: absolute;
      left: 1rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      font-size: 1rem;
      pointer-events: none;
    }
    .searchwrap .s-hint {
      position: absolute;
      right: 0.9rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      font-size: 0.68rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.1rem 0.4rem;
      pointer-events: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 0.8rem;
      max-width: 1280px;
      margin: 0 auto;
    }

    .section-title {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--text-dim);
      padding: 1.5rem 0 0.5rem 0.15rem;
    }
    .section-title:first-of-type { padding-top: 0.2rem; }
    .section-title .line { flex: 1; height: 1px; background: var(--border); }
    .section-title .count {
      font-size: 0.62rem;
      color: var(--text-faint);
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.9rem 1rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      transition: transform 0.16s cubic-bezier(.2,.8,.2,1), border-color 0.16s, background 0.16s, box-shadow 0.16s;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(110,231,255,0.06));
      opacity: 0;
      transition: opacity 0.16s;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: var(--border-hover);
      background: var(--panel-hover);
      box-shadow: 0 12px 28px -12px rgba(0,0,0,0.7);
    }
    .card:hover::before { opacity: 1; }
    .card.kbd-active {
      border-color: rgba(110,231,255,0.6);
      box-shadow: 0 0 0 3px rgba(110,231,255,0.12);
    }
    .card[data-nolink="true"] { cursor: default; }
    .card[data-nolink="true"]:hover { transform: none; }

    .card .icon {
      font-size: 1.5rem;
      width: 2.4rem; height: 2.4rem;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      flex-shrink: 0;
    }
    .card .info { flex: 1; min-width: 0; position: relative; z-index: 1; }
    .card .name { font-weight: 600; font-size: 0.92rem; color: #f4f7fb; }
    .card .url {
      font-size: 0.72rem; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 0.1rem;
    }
    .card .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 0.4rem; flex-shrink: 0; z-index: 1; }
    .card .badge {
      font-size: 0.6rem; padding: 0.12rem 0.5rem; border-radius: 99px;
      font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase;
    }
    .badge.ext { background: rgba(96,165,250,0.16); color: #93c5fd; }
    .badge.lan { background: rgba(110,231,180,0.14); color: #6ee7b7; }
    .badge.k8s { background: rgba(192,132,252,0.16); color: #d8b4fe; }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--unknown); flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .status-dot.up { background: var(--up); box-shadow: 0 0 0 3px rgba(52,211,153,0.18); }
    .status-dot.down { background: var(--down); box-shadow: 0 0 0 3px rgba(248,113,113,0.18); }
    .status-dot.checking { animation: pulse 1.1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }

    .card.hidden { display: none; }
    .section-title.hidden { display: none; }

    .footer {
      text-align: center; margin-top: 3rem;
      color: var(--text-faint); font-size: 0.7rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .footer .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--up); animation: pulse 2s ease-in-out infinite; }

    .noresult {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text-dim);
      padding: 3rem 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="greeting">
      <h1 id="greet">Command Centre</h1>
      <p id="subgreet">Home infrastructure &amp; services</p>
    </div>
    <div class="clock">
      <div class="time" id="clock-time">--:--</div>
      <div class="date" id="clock-date"></div>
    </div>
  </div>

  <div class="stats" id="stats">
    <div class="stat">
      <div class="label">Services Up</div>
      <div class="value good" id="stat-up">–</div>
      <div class="sub" id="stat-up-sub">checking…</div>
    </div>
    <div class="stat">
      <div class="label">Down</div>
      <div class="value" id="stat-down">–</div>
      <div class="sub">ext + lan + k8s</div>
    </div>
    <div class="stat">
      <div class="label">Total Services</div>
      <div class="value" id="stat-total">–</div>
      <div class="sub" id="stat-sections">– sections</div>
    </div>
    <div class="stat">
      <div class="label">Last Sweep</div>
      <div class="value" id="stat-sweep" style="font-size:1.1rem;padding-top:0.35rem;">–</div>
      <div class="sub">auto every 60s</div>
    </div>
  </div>

  <div class="searchwrap">
    <span class="s-icon">⌕</span>
    <input id="search" type="text" placeholder="Search services… (press / to focus, Enter to open top match, Esc to clear)" autocomplete="off" spellcheck="false">
    <span class="s-hint">/</span>
  </div>

  <div class="grid" id="services"></div>

  <div class="footer">
    <span class="live-dot"></span>
    <span id="last-check">Initialising…</span>
  </div>

  <script>
    const CONFIG = {
      sections: [
        {
          title: "Infrastructure",
          services: [
            { name: "Home Assistant", icon: "🏠", url: "https://home.brandwhisper.cloud", badge: "ext", health: "https://home.brandwhisper.cloud/api/" },
            { name: "ArgoCD", icon: "🔄", url: "https://argocd.brandwhisper.cloud", badge: "ext" },
            { name: "Rancher", icon: "🤠", url: "https://rancher.brandwhisper.cloud", badge: "ext" },
            { name: "Headscale", icon: "🔗", url: "https://headscale.brandwhisper.cloud", badge: "ext" },
            { name: "LiteLLM", icon: "🤖", url: "https://llm.brandwhisper.cloud", badge: "ext" },
            { name: "Hasura", icon: "🔷", url: "https://hasura.brandwhisper.cloud", badge: "ext" },
            { name: "Argo Rollouts", icon: "📊", url: "http://192.168.1.201:31000", badge: "lan" },
            { name: "Authentik", icon: "🔐", url: "https://authentik.brandwhisper.cloud", badge: "ext" },
            { name: "Mgmt Dashboard", icon: "📋", url: "https://mgmt.brandwhisper.cloud", badge: "ext" },
          ]
        },
        {
          title: "Smart Home",
          services: [
            { name: "ESPHome", icon: "📟", url: "http://192.168.1.201:6052", badge: "lan" },
            { name: "Zigbee2MQTT", icon: "📡", url: "http://192.168.1.201:30080", badge: "lan" },
            { name: "Bermuda Mapper", icon: "📍", url: "http://158.220.90.28:8099", badge: "lan" },
            { name: "Bermuda Tracking", icon: "🗺️", url: "http://158.220.90.28:3003/tracking", badge: "lan" },
            { name: "Frigate", icon: "📹", url: "https://frigate.brandwhisper.cloud", badge: "ext" },
            { name: "Ring MQTT", icon: "🔔", url: "http://192.168.1.201:55123", badge: "lan", noLink: true },
            { name: "Mosquitto", icon: "🦟", url: "http://192.168.1.201:31883", badge: "lan", noLink: true },
            { name: "Nextcloud", icon: "☁️", url: "http://192.168.1.201:80", badge: "lan" },
          ]
        },
        {
          title: "Media & Entertainment",
          services: [
            { name: "Jellyfin", icon: "🎬", url: "https://jellyfin.brandwhisper.cloud", badge: "ext" },
            { name: "Arthur Radio", icon: "📻", url: "https://radio.brandwhisper.cloud", badge: "ext" },
            { name: "TV Portal", icon: "📺", url: "http://192.168.1.201:30033", badge: "lan" },
          ]
        },
        {
          title: "AI & Voice",
          services: [
            { name: "TTS Server", icon: "🗣️", url: "http://192.168.1.201:30090/health", badge: "k8s" },
            { name: "Watch PTT", icon: "⌚", url: "http://192.168.1.201:9876", badge: "lan" },
            { name: "Desktop Portal", icon: "🖥️", url: "http://192.168.1.187:3001", badge: "lan" },
          ]
        },
        {
          title: "Network",
          services: [
            { name: "Router", icon: "🌐", url: "http://192.168.1.1", badge: "lan" },
            { name: "SOCKS Proxy", icon: "🧦", url: "http://192.168.1.201:1080", badge: "lan", noLink: true },
          ]
        },
        {
          title: "Finance",
          services: [
            { name: "Wealthfolio", icon: "💰", url: "https://wealthfolio.brandwhisper.cloud", badge: "ext", health: "https://wealthfolio.brandwhisper.cloud/" },
          ]
        },
        {
          title: "External",
          services: [
            { name: "arthurloe.com", icon: "🗡️", url: "https://arthurloe.com", badge: "ext" },
            { name: "GitHub — moonrepo", icon: "🐙", url: "https://github.com/binary64/moonrepo", badge: "ext" },
            { name: "GitHub — graphql-engine", icon: "🐙", url: "https://github.com/binary64/graphql-engine", badge: "ext" },
            { name: "Cloudflare", icon: "☁️", url: "https://dash.cloudflare.com", badge: "ext" },
            { name: "Notion", icon: "📝", url: "https://www.notion.so", badge: "ext" },
            { name: "Frappe HRMS", icon: "👥", url: "https://hrms.brandwhisper.cloud", badge: "ext" },
          ]
        }
      ]
    };

    const sanitizeId = (n) => n.replace(/\W/g, '');
    const displayUrl = (u) => u.replace(/^https?:\/\//, '').replace(/\/$/, '');
    let allCards = [];

    // Derive a host:port key from a tile URL, matching the health proxy's TARGETS.
    // Defaults the port to 80 when none is present (proxy does the same).
    function hostPortKey(url) {
      try {
        const u = new URL(url);
        const port = u.port || (u.protocol === 'https:' ? '443' : '80');
        return `${u.hostname}:${port}`;
      } catch { return null; }
    }

    // ---- Greeting ----
    function updateGreeting() {
      const h = new Date().getHours();
      let part = 'Hello';
      if (h < 5) part = 'Burning the midnight oil';
      else if (h < 12) part = 'Good morning';
      else if (h < 17) part = 'Good afternoon';
      else if (h < 21) part = 'Good evening';
      else part = 'Good evening';
      const greetEl = document.getElementById('greet');
      // Only set greeting text once visually (keeps gradient); name-agnostic for James/Abi shared page
      greetEl.textContent = part;
      const subs = [
        'Everything you run, one keystroke away.',
        'Home infrastructure & services.',
        'Press / to search, Enter to launch.',
      ];
      document.getElementById('subgreet').textContent = subs[h % subs.length];
    }

    // ---- Clock ----
    function tick() {
      const now = new Date();
      document.getElementById('clock-time').textContent =
        now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('clock-date').textContent =
        now.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long' });
    }

    // ---- Render ----
    function renderServices() {
      const grid = document.getElementById('services');
      let html = '';
      let total = 0;
      for (const section of CONFIG.sections) {
        const id = sanitizeId(section.title);
        html += `<div class="section-title" data-section="${id}"><span>${section.title}</span><span class="line"></span><span class="count" id="count-${id}">${section.services.length}</span></div>`;
        for (const svc of section.services) {
          total++;
          const nolink = !!svc.noLink;
          const tag = nolink ? 'div' : 'a';
          const attrs = nolink ? 'data-nolink="true"' : `href="${svc.url}" target="_blank" rel="noopener"`;
          html += `
            <${tag} class="card" ${attrs} data-section="${id}" data-name="${svc.name.toLowerCase()}" data-url="${displayUrl(svc.url).toLowerCase()}">
              <span class="icon">${svc.icon}</span>
              <div class="info">
                <div class="name">${svc.name}</div>
                <div class="url">${displayUrl(svc.url)}</div>
              </div>
              <div class="meta">
                <span class="status-dot checking" id="status-${sanitizeId(svc.name)}"></span>
                <span class="badge ${svc.badge}">${svc.badge}</span>
              </div>
            </${tag}>`;
        }
      }
      html += `<div class="noresult hidden" id="noresult">No services match your search.</div>`;
      grid.innerHTML = html;
      allCards = [...grid.querySelectorAll('.card')];
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-sections').textContent = CONFIG.sections.length + ' sections';
    }

    // ---- Health ----
    async function checkHealth() {
      let up = 0, down = 0, monTotal = 0;
      document.querySelectorAll('.status-dot.up,.status-dot.down').forEach(d => d.classList.add('checking'));

      // Pull server-side LAN/k8s reachability (same-origin, set by the health proxy).
      let lanStatus = {};
      try {
        const r = await fetch('/healthz', { cache: 'no-store' });
        if (r.ok) lanStatus = await r.json();
      } catch { /* proxy unreachable — lan tiles fall back to unknown below */ }

      const tasks = [];
      for (const section of CONFIG.sections) {
        for (const svc of section.services) {
          const dot = document.getElementById('status-' + sanitizeId(svc.name));
          if (!dot) continue;

          if (svc.badge === 'ext') {
            // Browser-side no-cors probe for HTTPS services.
            monTotal++;
            const url = svc.health || svc.url;
            tasks.push((async () => {
              try {
                const c = new AbortController();
                const t = setTimeout(() => c.abort(), 6000);
                await fetch(url, { mode: 'no-cors', signal: c.signal });
                clearTimeout(t);
                dot.className = 'status-dot up';
                up++;
              } catch {
                dot.className = 'status-dot down';
                down++;
              }
            })());
          } else {
            // LAN/k8s service — use server-side proxy result keyed by host:port.
            const key = hostPortKey(svc.url);
            const state = key ? lanStatus[key] : undefined;
            if (state === 'up') { dot.className = 'status-dot up'; up++; monTotal++; }
            else if (state === 'down') { dot.className = 'status-dot down'; down++; monTotal++; }
            else { dot.className = 'status-dot unknown'; } // proxy down or unmapped
          }
        }
      }
      await Promise.all(tasks);
      document.getElementById('stat-up').textContent = up;
      document.getElementById('stat-up-sub').textContent = `of ${monTotal} monitored`;
      const downEl = document.getElementById('stat-down');
      downEl.textContent = down;
      downEl.className = 'value' + (down > 0 ? ' bad' : ' good');
      const now = new Date();
      document.getElementById('stat-sweep').textContent =
        now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('last-check').textContent =
        `Live · ${up}/${monTotal} services healthy · last sweep ${now.toLocaleTimeString('en-GB')}`;
    }

    // ---- Search / keyboard ----
    const search = document.getElementById('search');
    function applyFilter() {
      const q = search.value.trim().toLowerCase();
      let firstMatch = null, visible = 0;
      const sectionHas = {};
      allCards.forEach(card => {
        const match = !q || card.dataset.name.includes(q) || card.dataset.url.includes(q);
        card.classList.toggle('hidden', !match);
        card.classList.remove('kbd-active');
        if (match) {
          visible++;
          sectionHas[card.dataset.section] = true;
          if (!firstMatch && card.tagName === 'A') firstMatch = card;
        }
      });
      document.querySelectorAll('.section-title').forEach(st => {
        st.classList.toggle('hidden', q && !sectionHas[st.dataset.section]);
      });
      document.getElementById('noresult').classList.toggle('hidden', visible > 0);
      if (q && firstMatch) firstMatch.classList.add('kbd-active');
      return firstMatch;
    }
    search.addEventListener('input', applyFilter);
    search.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const m = document.querySelector('.card.kbd-active');
        if (m && m.href) window.open(m.href, '_blank', 'noopener');
      } else if (e.key === 'Escape') {
        search.value = ''; applyFilter(); search.blur();
      }
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== search) {
        e.preventDefault(); search.focus();
      }
    });

    // ---- Boot ----
    updateGreeting();
    tick();
    renderServices();
    checkHealth();
    setInterval(tick, 1000 * 20);
    setInterval(updateGreeting, 1000 * 60 * 10);
    setInterval(checkHealth, 60000);
  </script>
</body>
</html>
