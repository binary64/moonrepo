# ESPHome Dashboard — web UI for managing ESP32 devices.
# Compiles firmware for ESP32 Bluetooth proxy devices (BLE triangulation).
# Runs on master node (NUC) for home LAN access to devices via OTA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esphome
  namespace: esphome
  labels:
    app: esphome
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: esphome
  template:
    metadata:
      labels:
        app: esphome
    spec:
      nodeSelector:
        node-role.kubernetes.io/master: "true"
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      # Host networking for mDNS device discovery and OTA flashing on LAN
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        # Sync device configs from ConfigMap into the PVC on every pod start.
        # Git/ArgoCD is the source of truth; ESPHome reads from /config as normal.
        # secrets.yaml stays in the PVC only — never in the ConfigMap.
        - name: sync-configs
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              set -e
              echo "Syncing ESPHome device configs from ConfigMap..."
              mkdir -p /config/packages

              # Copy device config files to /config/
              for f in /config-src/*.yaml; do
                [ -f "$f" ] || continue
                fname=$(basename "$f")
                cp "$f" "/config/${fname}"
                echo "  synced /config/${fname}"
              done

              # Copy package files to /config/packages/
              for f in /config-src/packages/*.yaml; do
                [ -f "$f" ] || continue
                fname=$(basename "$f")
                cp "$f" "/config/packages/${fname}"
                echo "  synced /config/packages/${fname}"
              done

              echo "Sync complete."
          volumeMounts:
            - name: config
              mountPath: /config
            - name: device-configs
              mountPath: /config-src
      containers:
        - name: esphome
          image: ghcr.io/esphome/esphome:2026.3.0
          ports:
            - containerPort: 6052
              protocol: TCP
          env:
            - name: ESPHOME_DASHBOARD_USE_PING
              value: "true"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: build-cache
              mountPath: /config/.esphome/build
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: 6052
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 6052
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: esphome-config
        - name: build-cache
          emptyDir: {}
          # Build artefacts (.pioenvs, compiled objects) are ephemeral.
          # Mounting as emptyDir prevents stale platformio cache from
          # causing "multiple ways to build same target" failures after
          # ESPHome or espressif32 platform version upgrades.
        - name: device-configs
          configMap:
            name: esphome-device-configs
            items:
              - key: triang1.yaml
                path: triang1.yaml
              - key: triang2.yaml
                path: triang2.yaml
              - key: triang3.yaml
                path: triang3.yaml
              - key: triang4.yaml
                path: triang4.yaml
              - key: triang5.yaml
                path: triang5.yaml
              - key: triang6.yaml
                path: triang6.yaml
              - key: triang7.yaml
                path: triang7.yaml
              - key: triang8.yaml
                path: triang8.yaml
              - key: triang9.yaml
                path: triang9.yaml
              - key: triang10.yaml
                path: triang10.yaml
              - key: triang11.yaml
                path: triang11.yaml
              - key: triang12.yaml
                path: triang12.yaml
              - key: triang13.yaml
                path: triang13.yaml
              - key: triang14.yaml
                path: triang14.yaml
              - key: triang15.yaml
                path: triang15.yaml
              - key: water-sensor.yaml
                path: water-sensor.yaml
              - key: triang-common.yaml
                path: packages/triang-common.yaml
              - key: water-sensor-base.yaml
                path: packages/water-sensor-base.yaml
