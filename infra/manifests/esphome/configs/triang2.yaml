esphome:
  name: triang2
  friendly_name: triang2

esp32:
  board: esp32dev
  framework:
    type: arduino

api:
  encryption:
    key: "YulI/KNfLvb0VKiLbNhqCdJCnHttd50K1XF0SwNJ5Tg="

ota:
  - platform: esphome
    password: "b8a2909e998eb9e171c6b57748b13099"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

logger:
  level: WARN

# MQTT for BLE RSSI reporting — bypasses HA Bermuda integration
mqtt:
  broker: 192.168.1.201
  port: 31883

esp32_ble_tracker:
  scan_parameters:
    interval: 320ms
    window: 300ms
    active: false
    continuous: true

# Keep bluetooth_proxy for HA device tracking (areas, presence)
bluetooth_proxy:
  active: false
  cache_services: true

# BLE RSSI sensors — one per tracked device, published to MQTT
# bermuda-mapper subscribes to: triang{n}/sensor/{name}/state
sensor:
  # Phone 1 (iBeacon via HA companion app)
  - platform: ble_rssi
    ibeacon_uuid: "649a97ae-8d4c-4552-a2c9-ab62df78c60c"
    ibeacon_major: 100
    ibeacon_minor: 40004
    name: "phone1_rssi"

  # Phone 2 (iBeacon)
  - platform: ble_rssi
    ibeacon_uuid: "f2272e9a-d2fe-43c1-b867-34be0b583516"
    ibeacon_major: 100
    ibeacon_minor: 40004
    name: "phone2_rssi"

  # Dog tracker (BLE tag — MAC address to be configured when tracker purchased)
  # - platform: ble_rssi
  #   service_uuid: "PLACEHOLDER"
  #   name: "dog_rssi"
