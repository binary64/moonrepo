# Shared config for all ESPHome BLE triangulation nodes.
# Included via packages: in each device file.
# Device file must define substitutions: name, friendly_name

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: LIGHT  # was NONE — allows modem sleep between transmissions
  output_power: 15dB      # was 20dB default — significant heat reduction

logger:
  level: WARN

mqtt:
  broker: !secret mqtt_broker
  port: !secret mqtt_port

esp32_ble_tracker:
  scan_parameters:
    interval: 500ms  # was 320ms
    window: 200ms    # was 300ms; duty cycle reduced from 94% to 40%
    active: false
    continuous: true

# bluetooth_proxy disabled — nodes only need ble_rssi for tracking;
# proxy relays all BLE advertisements to HA generating unnecessary WiFi traffic.
# bluetooth_proxy:
#   active: false
#   cache_services: true

esphome:
  platformio_options:
    board_build.f_cpu: 160000000L  # Reduce from 240MHz to 160MHz — lower heat, same BLE perf

sensor:
  # Phone 1 (iBeacon via HA companion app)
  - platform: ble_rssi
    ibeacon_uuid: !secret phone1_ibeacon_uuid
    ibeacon_major: 100
    ibeacon_minor: 40004
    name: "phone1_rssi"
    on_value:
      - lambda: 'id(last_publish_ms) = millis();'

  # Watch 1 (iBeacon via HA companion app on Galaxy Watch)
  - platform: ble_rssi
    ibeacon_uuid: !secret watch1_ibeacon_uuid
    ibeacon_major: 100
    ibeacon_minor: 40004
    name: "watch1_rssi"
    on_value:
      - lambda: 'id(last_publish_ms) = millis();'

  # Phone 2 (iBeacon)
  - platform: ble_rssi
    ibeacon_uuid: !secret phone2_ibeacon_uuid
    ibeacon_major: 100
    ibeacon_minor: 40004
    name: "phone2_rssi"
    on_value:
      - lambda: 'id(last_publish_ms) = millis();'

  # Watch 2 (iBeacon — UUID TBD)
  # - platform: ble_rssi
  #   ibeacon_uuid: !secret watch2_ibeacon_uuid
  #   ibeacon_major: 100
  #   ibeacon_minor: 40004
  #   name: "watch2_rssi"

  # Dog tracker (BLE tag — MAC TBD)
  # - platform: ble_rssi
  #   service_uuid: "PLACEHOLDER"
  #   name: "dog_rssi"

  # Internal temperature monitoring
  - platform: internal_temperature
    name: "${friendly_name} Temperature"
    update_interval: 60s
    on_value:
      - lambda: 'id(last_publish_ms) = millis();'
