# GENERATED — do not edit. Edit devices.yaml and run generate-devices.py
substitutions:
  name: triang5
  friendly_name: Triangulation Node 5

esphome:
  name: ${name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

globals:
  - id: last_publish_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'

output:
  - platform: gpio
    pin:
      number: GPIO2
      inverted: false
    id: status_led_out

interval:
  - interval: 1s
    then:
      - if:
          condition:
            lambda: 'return millis() - id(last_publish_ms) < 10000;'
          then:
            - output.turn_on: status_led_out
          else:
            - output.turn_off: status_led_out

packages:
  common: !include packages/triang-common.yaml
