esphome:
  name: esphome-web-4d08bc
  friendly_name: ESP-CAM 2
  min_version: 2025.11.0
  name_add_mac_suffix: false
  platformio_options:
    board_build.arduino.memory_type: qio_opi

esp32:
  variant: esp32
  board: esp32cam
  framework:
    type: arduino

psram:
  mode: quad
  speed: 40MHz

logger:
  level: WARN

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: NONE

esp32_camera:
  name: ESP-CAM 2
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: 800x600
  jpeg_quality: 12
  max_framerate: 15fps
  vertical_flip: false
  horizontal_mirror: false

esp32_camera_web_server:
  port: 80
  mode: stream
