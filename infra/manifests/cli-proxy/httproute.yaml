apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cli-proxy
  namespace: cli-proxy
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    - "cliproxy.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: cli-proxy
          port: 8317
          weight: 1
