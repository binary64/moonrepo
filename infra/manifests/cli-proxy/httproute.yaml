apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cli-proxy
  namespace: cli-proxy
  annotations:
    moonrepo.dev/skip-local: "true"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
  hostnames:
    # External access required: exposes CLI OAuth tokens as OpenAI/Gemini/Claude-compatible
    # endpoints -- must be reachable from external clients (not just within the cluster).
    - "cliproxy.brandwhisper.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: cli-proxy
          port: 8317
          weight: 1
