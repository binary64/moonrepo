---
# TODO: Replace with SealedSecret once kubeseal public key is available.
# For now, create the secret manually on the cluster:
#   kubectl create secret generic cli-proxy-api-key \
#     --namespace cli-proxy \
#     --from-literal=api-key='YOUR_ACTUAL_KEY'
apiVersion: v1
kind: Secret
metadata:
  name: cli-proxy-api-key
  namespace: cli-proxy
type: Opaque
stringData:
  api-key: "REPLACE_BEFORE_DEPLOY"
