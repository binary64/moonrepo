# Sealed secret for cli-proxy-api-key.
#
# To seal (requires cluster access via kubeseal):
#
#   kubectl create secret generic cli-proxy-api-key \
#     --namespace cli-proxy \
#     --from-literal=api-key='YOUR_ACTUAL_API_KEY' \
#     --dry-run=client -o yaml | \
#   kubeseal --controller-name sealed-secrets \
#     --controller-namespace sealed-secrets -o yaml \
#     > infra/manifests/cli-proxy/sealed-secret.yaml
#
# The api-key value is injected into the deployment as CLI_PROXY_API_KEY env var.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cli-proxy-api-key
  namespace: cli-proxy
  annotations:
    # Skip local execution — sealed secrets require a live cluster sealed-secrets controller
    moonrepo.dev/skip-local: "true"
    # Must be available before application workloads start
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    # ⚠️  TODO: Populate with kubeseal output (see instructions above)
    api-key: PLACEHOLDER_REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: cli-proxy-api-key
      namespace: cli-proxy
    type: Opaque
