apiVersion: v1
kind: Service
metadata:
  name: cli-proxy
  namespace: cli-proxy
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app: cli-proxy
spec:
  selector:
    app: cli-proxy
  ports:
    - name: api
      port: 8317
      targetPort: 8317
      protocol: TCP
  type: ClusterIP
