apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: system:kube-proxy:extended
  labels:
    app: kube-proxy
rules:
  # Core resources kube-proxy needs but the default RKE2 ClusterRole lacks
  # when agent node runs v1.34+ against a v1.33 control plane
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["servicecidrs"]
    verbs: ["get", "list", "watch"]
