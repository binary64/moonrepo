apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-config
  namespace: frigate
  labels:
    app: frigate
  annotations:
    moonrepo.dev/skip-local: "true"
    argocd.argoproj.io/sync-wave: "2"
data:
  config.yml: |
    mqtt:
      host: mosquitto.home-assistant.svc
      port: 1883
      # Mosquitto has allow_anonymous false; creds injected via env (see deployment).
      user: "{FRIGATE_MQTT_USER}"
      password: "{FRIGATE_MQTT_PASSWORD}"

    go2rtc:
      streams:
        # _live is the ONLY real video source on a battery Ring without a Ring Protect
        # subscription (_event clips require Protect, so that stream is empty here).
        # Keeping a persistent consumer on _live drains the battery (100->9% in days),
        # so the front_door camera is DISABLED by default (enabled: false below) and
        # only switched on on-demand by the HA automation
        # "ring_front_door_ondemand_record" for ~30s on motion / ~120s on ding.
        # This gives free local recordings (Nest-Protect style) at minimal battery cost.
        front_door:
          - "rtsp://ring-mqtt.ring-mqtt.svc:8554/5c475e55fb69_live"

    cameras:
      front_door:
        # Disabled at rest = no RTSP consumer = Ring stays asleep = no battery drain.
        # Toggled on-demand via MQTT topic frigate/front_door/enabled/set by HA.
        enabled: false
        ffmpeg:
          inputs:
            - path: rtsp://127.0.0.1:8554/front_door
              input_args: preset-rtsp-restream
              roles:
                - detect
                - record
        detect:
          enabled: true
          width: 1280
          height: 720
          fps: 5
        record:
          enabled: true
          retain:
            # mode: all -> keep the FULL on-demand window (a person ringing while
            # standing still may not trip motion-based retention). Cheap because the
            # camera is only on during real events, not 24/7.
            days: 7
            mode: all
          events:
            retain:
              default: 14
        snapshots:
          enabled: true
          retain:
            default: 14
        objects:
          track:
            - person
            - dog
            - cat
            - car
        motion:
          threshold: 30
          contour_area: 10

      esp_cam_1:
        enabled: true
        ffmpeg:
          inputs:
            - path: http://192.168.1.11:80/
              input_args: -analyzeduration 10000000 -probesize 5000000 -timeout 30000000 -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 60 -r 2
              roles:
                - detect
                - record
          retry_interval: 60
        detect:
          enabled: true
          width: 800
          height: 600
          fps: 2
        record:
          enabled: true
          retain:
            days: 7
            mode: motion
          events:
            retain:
              default: 14
        snapshots:
          enabled: true
          retain:
            default: 14
        objects:
          track:
            - person
            - dog
            - cat
        motion:
          threshold: 25
          contour_area: 15

      esp_cam_2:
        enabled: true
        ffmpeg:
          inputs:
            - path: http://192.168.1.41:80/
              input_args: -analyzeduration 10000000 -probesize 5000000 -timeout 30000000 -reconnect 1 -reconnect_streamed 1 -reconnect_delay_max 60 -r 2
              roles:
                - detect
                - record
          retry_interval: 60
        detect:
          enabled: true
          width: 800
          height: 600
          fps: 2
        record:
          enabled: true
          retain:
            days: 7
            mode: motion
          events:
            retain:
              default: 14
        snapshots:
          enabled: true
          retain:
            default: 14
        objects:
          track:
            - person
            - dog
            - cat
        motion:
          threshold: 25
          contour_area: 15

    detectors:
      cpu1:
        type: cpu
        num_threads: 2

    database:
      path: /data/frigate.db
