apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: frigate
  annotations:
    moonrepo.dev/skip-local: "true"
    reloader.stakater.com/auto: "true"
  labels:
    app: frigate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frigate
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      # Run on master (NUC) — LAN access required for camera streams
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      dnsPolicy: ClusterFirst
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          # Frigate 0.16 auto-migrates config.yml on boot AND writes a version
          # stamp + backup into /config. A ConfigMap subPath mount is read-only,
          # which makes that migration fail ("Config file is read-only") and can
          # crash-loop the pod. Fix: copy the ConfigMap into a writable /config
          # (hostPath) so Frigate can rewrite it freely. The same writable dir
          # holds /config/model_cache, so the face-recognition + semantic-search
          # embedding models persist across restarts instead of re-downloading.
          image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              # Always overwrite config.yml from the ConfigMap (git is source of
              # truth); leave model_cache and migration backups untouched.
              cp -f /config-src/config.yml /config/config.yml
              chmod 644 /config/config.yml
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config-src
              mountPath: /config-src
            - name: config
              mountPath: /config
        - name: init-shm-logs
          # Pre-create /dev/shm/logs subdirs with correct permissions so s6-overlay's
          # log-prepare service does not need CAP_FOWNER to chmod them at startup.
          # Runs as root; only needs the shared emptyDir volume.
          image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mkdir -p /dev/shm/logs/frigate /dev/shm/logs/go2rtc /dev/shm/logs/nginx /dev/shm/logs/certsync
              chmod 755 /dev/shm/logs /dev/shm/logs/frigate /dev/shm/logs/go2rtc /dev/shm/logs/nginx /dev/shm/logs/certsync
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: shm
              mountPath: /dev/shm
      containers:
        - name: frigate
          image: ghcr.io/blakeblackshear/frigate:0.16.4@sha256:1f8dbaaa4c7c2855c2aef711842d13b0c20bfdc3f28ad88faf66aa1bc219b108
          imagePullPolicy: IfNotPresent
          env:
            # Mosquitto requires auth (allow_anonymous false). Same 'mqtt' user as
            # ring-mqtt/zigbee2mqtt. Referenced in config.yml via {FRIGATE_MQTT_USER}
            # / {FRIGATE_MQTT_PASSWORD}. Without this Frigate logs "MQTT Not authorized"
            # and the camera enable/disable toggle (frigate/<cam>/enabled/set) is dead.
            - name: FRIGATE_MQTT_USER
              valueFrom:
                secretKeyRef:
                  name: frigate-mqtt
                  key: username
            - name: FRIGATE_MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frigate-mqtt
                  key: password
          ports:
            - containerPort: 5000
              protocol: TCP
              name: web
            - containerPort: 8554
              protocol: TCP
              name: rtsp
            - containerPort: 8555
              protocol: TCP
              name: webrtc-tcp
            - containerPort: 8555
              protocol: UDP
              name: webrtc-udp
            - containerPort: 1984
              protocol: TCP
              name: go2rtc-api
          securityContext:
            runAsNonRoot: false  # Frigate requires root for ffmpeg and /dev/shm access
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN      # s6-overlay needs to chown /dev/shm/logs/* on init
                - SETUID     # s6-overlay drops to service user after init
                - SETGID     # s6-overlay drops to service group after init
                - FOWNER     # s6-overlay log-prepare chmods /dev/shm/logs/* subdirs
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: media
              mountPath: /media/frigate
            - name: cache
              mountPath: /tmp/cache
            - name: shm
              mountPath: /dev/shm
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 3Gi  # 0.16 face-recognition + semantic-search embedding models need headroom (was 2Gi)
          # 0.16 first boot runs a DB schema migration and downloads embedding
          # models — can take several minutes. startupProbe gives it up to 10min
          # before liveness kicks in, preventing a crash-loop on first rollout.
          # CPU face-recognition embedding briefly blocks the HTTP API (the
          # facenet model runs synchronously on-CPU, no GPU on the NUC). With the
          # default timeoutSeconds:1 the probe declares the pod dead during any
          # face register/recognise and Kubernetes crash-loops it. Generous
          # timeouts let the API be briefly busy without being killed.
          startupProbe:
            httpGet:
              path: /api/version
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /api/version
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/version
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 8
            failureThreshold: 5
      # hostPath volumes are intentional for a single-node NVR deployment.
      # Recordings and runtime data are non-critical (ephemeral/overwritten by retention policy)
      # and must live on the host filesystem for performance and persistence across pod restarts.
      volumes:
        # ConfigMap mounted read-only at a side path; init-config copies it into
        # the writable hostPath /config below so Frigate can self-migrate.
        - name: config-src
          configMap:
            name: frigate-config
        # Writable config dir — holds the live (migratable) config.yml plus
        # /config/model_cache (face-recognition + semantic-search embedding models).
        - name: config
          hostPath:
            path: /opt/frigate/config
            type: DirectoryOrCreate
        - name: data
          hostPath:
            path: /opt/frigate/data
            type: DirectoryOrCreate
        - name: media
          hostPath:
            path: /opt/frigate/media
            type: DirectoryOrCreate
        - name: cache
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 256Mi
