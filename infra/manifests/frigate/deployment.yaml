apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    moonrepo.dev/skip-local: 'true'
    reloader.stakater.com/auto: 'true'
  labels:
    app: frigate
  name: frigate
  namespace: frigate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frigate
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      automountServiceAccountToken: false
      containers:
      - envFrom:
        - secretRef:
            name: frigate-env
        image: ghcr.io/blakeblackshear/frigate:0.14.1@sha256:656301bd28c08f15a778f1fe37b8332e0ae8189c6311e0fcc58b1e7a8f8ab310
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /api/version
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 30
        name: frigate
        ports:
        - containerPort: 5000
          name: web
          protocol: TCP
        - containerPort: 8554
          name: rtsp
          protocol: TCP
        - containerPort: 8555
          name: webrtc-tcp
          protocol: TCP
        - containerPort: 8555
          name: webrtc-udp
          protocol: UDP
        - containerPort: 1984
          name: go2rtc-api
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /api/version
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: 2000m
            memory: 2Gi
          requests:
            cpu: 250m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - CHOWN
            - SETUID
            - SETGID
            - FOWNER
            drop:
            - ALL
          runAsNonRoot: false
        volumeMounts:
        - mountPath: /config/config.yml
          name: config
          subPath: config.yml
        - mountPath: /data
          name: data
        - mountPath: /media/frigate
          name: media
        - mountPath: /tmp/cache
          name: cache
        - mountPath: /dev/shm
          name: shm
      dnsPolicy: ClusterFirst
      initContainers:
      - command:
        - sh
        - -c
        - 'mkdir -p /dev/shm/logs/frigate /dev/shm/logs/go2rtc /dev/shm/logs/nginx
          /dev/shm/logs/certsync

          chmod 755 /dev/shm/logs /dev/shm/logs/frigate /dev/shm/logs/go2rtc /dev/shm/logs/nginx
          /dev/shm/logs/certsync

          '
        image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
        imagePullPolicy: IfNotPresent
        name: init-shm-logs
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: false
          runAsUser: 0
        volumeMounts:
        - mountPath: /dev/shm
          name: shm
      nodeSelector:
        node-role.kubernetes.io/control-plane: 'true'
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/master
      - effect: NoSchedule
        key: node-role.kubernetes.io/control-plane
      volumes:
      - configMap:
          name: frigate-config
        name: config
      - hostPath:
          path: /opt/frigate/data
          type: DirectoryOrCreate
        name: data
      - hostPath:
          path: /opt/frigate/media
          type: DirectoryOrCreate
        name: media
      - emptyDir:
          medium: Memory
          sizeLimit: 2Gi
        name: cache
      - emptyDir:
          medium: Memory
          sizeLimit: 256Mi
        name: shm
