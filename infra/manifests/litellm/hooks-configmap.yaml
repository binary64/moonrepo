apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-hooks
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
data:
  hooks.py: |
    """
    Anthropic OAuth pre-call hook for LiteLLM Proxy.
    Injects OAuth headers for Anthropic API calls.
    """
    import os
    from litellm.integrations.custom_logger import CustomLogger

    class AnthropicOAuthHook(CustomLogger):
        async def async_pre_call_hook(self, user_api_key_dict, cache, data, call_type):
            model = data.get("model", "")
            if not model.startswith("anthropic/"):
                return data

            extra_headers = data.get("extra_headers") or {}
            extra_headers["Authorization"] = f"Bearer {os.environ['OAUTH_TOKEN']}"
            extra_headers["anthropic-version"] = "2023-06-01"
            extra_headers["anthropic-beta"] = "oauth-2025-04-20"
            data["extra_headers"] = extra_headers
            data["api_key"] = ""
            return data

    proxy_handler_instance = AnthropicOAuthHook()
