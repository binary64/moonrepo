apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
      app.kubernetes.io/instance: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/instance: litellm
    spec:
      nodeSelector:
        kubernetes.io/hostname: vmi3137202
      initContainers:
        # Wait for PostgreSQL to be reachable before starting LiteLLM.
        # Prisma's Rust engine has DNS issues on wolfi-based images (BerriAI/litellm#16190),
        # so we resolve the ClusterIP here and also verify TCP connectivity.
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for litellm-postgres:5432..."
              for i in $(seq 1 60); do
                if nc -z litellm-postgres 5432 2>/dev/null; then
                  echo "PostgreSQL is ready"
                  exit 0
                fi
                echo "Attempt $i/60 - not ready, waiting 2s..."
                sleep 2
              done
              echo "PostgreSQL not reachable after 120s"
              exit 1
      containers:
        - name: litellm
          image: "litellm/litellm:v1.82.3-stable"
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--port"
            - "4000"
            - "--detailed_debug"
          env:
            # All API keys from secret
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: LITELLM_MASTER_KEY
            # PostgreSQL for virtual key auth + cost tracking (required in v1.81+)
            # POSTGRES_PASSWORD must come BEFORE DATABASE_URL for $(…) expansion
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://litellm:$(POSTGRES_PASSWORD)@litellm-postgres:5432/litellm"
            # Anthropic OAuth token for custom hook
            - name: OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: ANTHROPIC_OAUTH_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: OPENAI_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: GEMINI_API_KEY
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: ZAI_API_KEY
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: OPENROUTER_API_KEY
            - name: PYTHONPATH
              value: "/hooks"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
            - name: hooks
              mountPath: /hooks/hooks.py
              subPath: hooks.py
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: litellm-config
        - name: hooks
          configMap:
            name: litellm-hooks
