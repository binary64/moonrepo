apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
      app.kubernetes.io/instance: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/instance: litellm
    spec:
      nodeSelector:
        kubernetes.io/hostname: vmi3137202
      initContainers:
        # Wait for CNPG postgres to be reachable, then run Prisma migrations.
        # Co-located on Jupiter so Prisma's Rust/tokio engine works (no cross-node
        # Calico TX checksum offload bug).
        - name: wait-and-migrate
          image: "litellm/litellm:v1.82.3-stable"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "Waiting for postgres at ${POSTGRES_HOST}:5432..."
              until python3 -c "import socket; socket.create_connection(('${POSTGRES_HOST}', 5432), 2)" 2>/dev/null; do
                echo "  not ready, retrying in 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready — running migrations..."
              cd /app && prisma migrate deploy --schema litellm/proxy/schema.prisma
              echo "Migrations complete."
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-pg-app
                  key: uri
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: litellm-pg-app
                  key: host
      containers:
        - name: litellm
          image: "litellm/litellm:v1.82.3-stable"
          args:
            - "--config"
            - "/etc/litellm/config.yaml"
            - "--port"
            - "4000"
            - "--detailed_debug"
          env:
            # All API keys from secret
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: LITELLM_MASTER_KEY
            # PostgreSQL connection via CNPG-generated secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-pg-app
                  key: uri
            # Anthropic OAuth token for custom hook
            - name: OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: ANTHROPIC_OAUTH_TOKEN
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: ANTHROPIC_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: OPENAI_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: GEMINI_API_KEY
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: ZAI_API_KEY
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: OPENROUTER_API_KEY
            - name: PYTHONPATH
              value: "/etc/litellm"
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/litellm
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: litellm-config
