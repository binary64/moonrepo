# ⚠️ PLACEHOLDER — do NOT commit real credentials to this public repo.
#
# Apply the real secret manually:
#   kubectl -n litellm create secret generic litellm-env \
#     --from-literal=LITELLM_MASTER_KEY='sk-...' \
#     --from-literal=ANTHROPIC_API_KEY='sk-ant-...' \
#     --from-literal=OPENAI_API_KEY='sk-proj-...' \
#     --from-literal=GEMINI_API_KEY='AIza...' \
#     --from-literal=ZAI_API_KEY='...' \
#     --from-literal=POSTGRES_PASSWORD='...'
apiVersion: v1
kind: Secret
metadata:
  name: litellm-env
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
  annotations:
    # Prevent ArgoCD from deleting this resource if removed from git
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
stringData:
  LITELLM_MASTER_KEY: "CHANGE_ME"
  ANTHROPIC_API_KEY: "CHANGE_ME"
  OPENAI_API_KEY: "CHANGE_ME"
  GEMINI_API_KEY: "CHANGE_ME"
  ZAI_API_KEY: "CHANGE_ME"
  POSTGRES_PASSWORD: "CHANGE_ME"
