# ⚠️ This secret is managed OUT-OF-BAND — real values applied via kubectl.
# ArgoCD manages only the metadata; data fields are excluded from sync
# via ignoreDifferences + ManagedFieldsOnly in the Application spec.
#
# Apply:
#   kubectl -n litellm create secret generic litellm-env \
#     --from-literal=LITELLM_MASTER_KEY='sk-...' \
#     --from-literal=ANTHROPIC_API_KEY='sk-ant-...' \
#     --from-literal=OPENAI_API_KEY='sk-proj-...' \
#     --from-literal=GEMINI_API_KEY='AIza...' \
#     --from-literal=ZAI_API_KEY='...' \
#     --from-literal=POSTGRES_PASSWORD='...'
apiVersion: v1
kind: Secret
metadata:
  name: litellm-env
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    argocd.argoproj.io/managed-by: manual
type: Opaque
