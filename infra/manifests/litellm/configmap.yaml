apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
data:
  config.yaml: |
    # LiteLLM Proxy Configuration
    # API keys are injected via environment variables from the litellm-env Secret.
    # Reference: https://docs.litellm.ai/docs/proxy/configs

    general_settings:
      # Master key protects all proxy endpoints — required for public exposure
      master_key: os.environ/LITELLM_MASTER_KEY

      # Rate limiting (per virtual key)
      max_parallel_requests: 2
      global_max_parallel_requests: 6

      # Disable model listing without auth (security)
      allow_requests_on_unmatched_routes: false

      # Allow custom auth
      forward_client_headers_to_llm_api: true

      # Allow debugging traffic
      store_model_in_db: true
      store_prompts_in_spend_logs: true

    litellm_settings:
      # Drop unmapped params to avoid leaking info
      drop_params: true
      # Request timeout
      request_timeout: 300
      # Enable cost tracking
      success_callback: []
      # Max tokens guard
      max_tokens: 36384

    model_list:
      # ══════════════════════════════════════════
      # Anthropic (Claude Max $200) — SHADOW PRICING
      #
      # Assumption: Max ≈ $2,000 API-equivalent/month => multiply official API prices by 0.10
      # Cache assumptions: cache read = 0.1× input, cache write = 1.25× input (5-min TTL)
      # ══════════════════════════════════════════
      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/claude-opus-4-6
          # official: $5 / $25 per 1M  => shadow: $0.50 / $2.50 per 1M
          input_cost_per_token: 0.00000050
          output_cost_per_token: 0.00000250
          cache_read_input_token_cost: 0.00000005
          cache_creation_input_token_cost: 0.000000625

      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          # official: $3 / $15 per 1M  => shadow: $0.30 / $1.50 per 1M
          input_cost_per_token: 0.00000030
          output_cost_per_token: 0.00000150
          cache_read_input_token_cost: 0.00000003
          cache_creation_input_token_cost: 0.000000375

      - model_name: claude-haiku-4-5
        litellm_params:
          model: anthropic/claude-haiku-4-5
          # official: $1 / $5 per 1M  => shadow: $0.10 / $0.50 per 1M
          input_cost_per_token: 0.00000010
          output_cost_per_token: 0.00000050
          cache_read_input_token_cost: 0.00000001
          cache_creation_input_token_cost: 0.000000125

      # ══════════════════════════════════════════
      # Google Gemini 3 Series — API PRICING
      # ══════════════════════════════════════════
      - model_name: gemini-3-pro-preview
        litellm_params:
          model: gemini/gemini-3-pro-preview
          api_key: os.environ/GEMINI_API_KEY
          # $2.00 / $12.00 per 1M (<=200k context)
          # DEPRECATED: shutting down March 9, 2026 — migrate to 3.1 Pro
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012

      - model_name: gemini-3-flash-preview
        litellm_params:
          model: gemini/gemini-3-flash-preview
          api_key: os.environ/GEMINI_API_KEY
          # $0.50 / $3.00 per 1M
          input_cost_per_token: 0.0000005
          output_cost_per_token: 0.000003

      - model_name: gemini-3-pro-image-preview
        litellm_params:
          model: gemini/gemini-3-pro-image-preview
          api_key: os.environ/GEMINI_API_KEY
          # Nano Banana Pro — image generation model
          # Text: $2.00 / $12.00 per 1M (same as 3 Pro). Images: $120.00 per 1M output tokens
          # DEPRECATED: shutting down March 9, 2026 — migrate to 3.1 Flash Image
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012

      # ══════════════════════════════════════════
      # Google Gemini 3.1 Series — API PRICING
      # ══════════════════════════════════════════
      - model_name: gemini-3.1-pro-preview
        litellm_params:
          model: gemini/gemini-3.1-pro-preview
          api_key: os.environ/GEMINI_API_KEY
          # $2.00 / $12.00 per 1M (<=200k context)
          input_cost_per_token: 0.000002
          output_cost_per_token: 0.000012

      - model_name: gemini-3.1-flash-lite-preview
        litellm_params:
          model: gemini/gemini-3.1-flash-lite-preview
          api_key: os.environ/GEMINI_API_KEY
          # $0.25 / $1.50 per 1M
          input_cost_per_token: 0.00000025
          output_cost_per_token: 0.0000015

      - model_name: gemini-3.1-flash-image-preview
        litellm_params:
          model: gemini/gemini-3.1-flash-image-preview
          api_key: os.environ/GEMINI_API_KEY
          # Nano Banana 2 — image generation model
          # Text: $0.50 / $3.00 per 1M. Images: $60.00 per 1M output tokens
          # (~$0.045/image at 0.5K, ~$0.067/image at 1K, ~$0.151/image at 4K)
          input_cost_per_token: 0.0000005
          output_cost_per_token: 0.000003

      # ══════════════════════════════════════════
      # ZAI / GLM Coding Plan Max — SHADOW PRICING
      #
      # Goal: reflect plan cost ≈ $68/mo (≈ 0.34× of $200).
      # Assumption: ~870M tokens/month on the plan => $68 / 870 ≈ $0.078 per 1M
      # Use flat $0.08 / 1M for both input & output (Coding Plan shadow pricing).
      # ══════════════════════════════════════════
      - model_name: glm-5
        litellm_params:
          model: zai/glm-5
          api_key: os.environ/ZAI_API_KEY
          api_base: https://api.z.ai/api/coding/paas/v4
        model_info:
          input_cost_per_token: 0.00000008
          output_cost_per_token: 0.00000008

      - model_name: glm-4.7
        litellm_params:
          model: zai/glm-4.7
          api_key: os.environ/ZAI_API_KEY
          api_base: https://api.z.ai/api/coding/paas/v4
        model_info:
          input_cost_per_token: 0.00000008
          output_cost_per_token: 0.00000008

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-hooks
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
data:
  hooks.py: |
    """
    Anthropic OAuth pre-call hook for LiteLLM Proxy.

    This hook injects OAuth headers for Anthropic API calls, replacing the
    traditional API key auth approach.
    """
    import os

    async def async_pre_call_hook(self, user_api_key_dict, cache, data, call_type):
        """
        Runs before provider request. Mutate headers / auth here.
        """
        headers = data.get("headers") or {}
        headers["Authorization"] = f"Bearer {os.environ['OAUTH_TOKEN']}"
        headers["anthropic-version"] = "2023-06-01"
        headers["anthropic-beta"] = "oauth-2025-04-20"
        data["headers"] = headers

        # Make sure we don't accidentally also send x-api-key
        for k in ["api-key", "litellm-api-key", "litellm_api_key", "api_key", "anthropic_api_key"]:
            if k in data:
                del data[k]
