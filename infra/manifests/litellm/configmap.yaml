apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
data:
  config.yaml: |
    # LiteLLM Proxy Configuration
    # API keys are injected via environment variables from the litellm-env Secret.
    # Reference: https://docs.litellm.ai/docs/proxy/configs

    general_settings:
      # Master key protects all proxy endpoints — required for public exposure
      master_key: os.environ/LITELLM_MASTER_KEY

      # Rate limiting (per virtual key)
      max_parallel_requests: 20
      global_max_parallel_requests: 50

      # Disable model listing without auth (security)
      allow_requests_on_unmatched_routes: false

      # Allow debugging traffic
      store_model_in_db: true
      store_prompts_in_spend_logs: true

    litellm_settings:
      # Drop unmapped params to avoid leaking info
      drop_params: true
      # Request timeout
      request_timeout: 300
      # Enable cost tracking
      success_callback: []
      # Max tokens guard
      max_tokens: 16384

    model_list:
      # ══════════════════════════════════════════
      # Anthropic (OAuth via custom hook)
      # ══════════════════════════════════════════
      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/claude-opus-4-6
          input_cost_per_token: 0.00000517
          output_cost_per_token: 0.00002586
          cache_read_input_token_cost: 0.00000052
          cache_creation_input_token_cost: 0.00000647

      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          input_cost_per_token: 0.00000104
          output_cost_per_token: 0.00000518
          cache_read_input_token_cost: 0.0000001
          cache_creation_input_token_cost: 0.00000129

      - model_name: claude-haiku-4-5
        litellm_params:
          model: anthropic/claude-haiku-4-5
          input_cost_per_token: 0.00000028
          output_cost_per_token: 0.00000138
          cache_read_input_token_cost: 0.00000003
          cache_creation_input_token_cost: 0.00000035

      # ══════════════════════════════════════════
      # OpenAI (direct — latest nano only)
      # ══════════════════════════════════════════
      - model_name: gpt-4.1-nano
        litellm_params:
          model: openai/gpt-4.1-nano
          api_key: os.environ/OPENAI_API_KEY

      # ══════════════════════════════════════════
      # Google Gemini (direct API)
      # ══════════════════════════════════════════
      - model_name: gemini-2.5-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      - model_name: gemini-2.5-pro
        litellm_params:
          model: gemini/gemini-2.5-pro
          api_key: os.environ/GEMINI_API_KEY

      - model_name: gemini-2.0-flash
        litellm_params:
          model: gemini/gemini-2.0-flash
          api_key: os.environ/GEMINI_API_KEY

      # ══════════════════════════════════════════
      # ZAI / GLM (direct via BigModel)
      # ══════════════════════════════════════════
      - model_name: glm-5
        litellm_params:
          model: openai/glm-5
          api_key: os.environ/ZAI_API_KEY
          api_base: https://api.z.ai/api/paas/v4

      - model_name: glm-4.7
        litellm_params:
          model: openai/glm-4.7
          api_key: os.environ/ZAI_API_KEY
          api_base: https://open.bigmodel.cn/api/paas/v4

      - model_name: glm-4.7-flash
        litellm_params:
          model: openai/glm-4.7-flash
          api_key: os.environ/ZAI_API_KEY
          api_base: https://open.bigmodel.cn/api/paas/v4

      - model_name: glm-4.5-flash
        litellm_params:
          model: openai/glm-4.5-flash
          api_key: os.environ/ZAI_API_KEY
          api_base: https://open.bigmodel.cn/api/paas/v4

      # ══════════════════════════════════════════
      # OpenRouter — FREE models (all with tool support)
      # NOTE: openrouter/free meta-router deliberately excluded —
      #       it logs all prompts/outputs and is marked non-production.
      # ══════════════════════════════════════════
      - model_name: qwen3-coder-free
        litellm_params:
          model: openrouter/qwen/qwen3-coder:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: qwen3-235b-thinking-free
        litellm_params:
          model: openrouter/qwen/qwen3-235b-a22b-thinking-2507:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: llama-3.3-70b-free
        litellm_params:
          model: openrouter/meta-llama/llama-3.3-70b-instruct:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: gemma-3-27b-free
        litellm_params:
          model: openrouter/google/gemma-3-27b-it:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: mistral-small-free
        litellm_params:
          model: openrouter/mistralai/mistral-small-3.1-24b-instruct:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: stepfun-flash-free
        litellm_params:
          model: openrouter/stepfun/step-3.5-flash:free
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: gpt-oss-120b-free
        litellm_params:
          model: openrouter/openai/gpt-oss-120b:free
          api_key: os.environ/OPENROUTER_API_KEY

      # ══════════════════════════════════════════
      # OpenRouter — ULTRA CHEAP agentic models
      # (<$0.50/M input, tool support, 64k+ context)
      # ══════════════════════════════════════════
      - model_name: gpt-5-nano
        litellm_params:
          model: openrouter/openai/gpt-5-nano
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: qwen3-coder-next
        litellm_params:
          model: openrouter/qwen/qwen3-coder-next
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: deepseek-v3.2
        litellm_params:
          model: openrouter/deepseek/deepseek-v3.2
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: deepseek-r1
        litellm_params:
          model: openrouter/deepseek/deepseek-r1-0528
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: minimax-m2.5
        litellm_params:
          model: openrouter/minimax/minimax-m2.5
          api_key: os.environ/OPENROUTER_API_KEY

      - model_name: kimi-k2.5
        litellm_params:
          model: openrouter/moonshotai/kimi-k2.5
          api_key: os.environ/OPENROUTER_API_KEY

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-hooks
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
data:
  hooks.py: |
    """
    Anthropic OAuth pre-call hook for LiteLLM Proxy.

    This hook injects OAuth headers for Anthropic API calls, replacing the
    traditional API key auth approach.
    """
    import os

    async def async_pre_call_hook(self, user_api_key_dict, cache, data, call_type):
        """
        Runs before provider request. Mutate headers / auth here.
        """
        headers = data.get("headers") or {}
        headers["Authorization"] = f"Bearer {os.environ['OAUTH_TOKEN']}"
        headers["anthropic-version"] = "2023-06-01"
        headers["anthropic-beta"] = "oauth-2025-04-20"
        data["headers"] = headers

        # Make sure we don't accidentally also send x-api-key
        for k in ["api_key", "anthropic_api_key"]:
            if k in data:
                del data[k]
