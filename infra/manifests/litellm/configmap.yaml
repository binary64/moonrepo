apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-config
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: litellm
data:
  config.yaml: |
    # LiteLLM Proxy Configuration
    # API keys are injected via environment variables from the litellm-env Secret.
    # Reference: https://docs.litellm.ai/docs/proxy/configs

    general_settings:
      # Master key protects all proxy endpoints — required for public exposure
      master_key: os.environ/LITELLM_MASTER_KEY

      # Rate limiting (per virtual key)
      max_parallel_requests: 20
      global_max_parallel_requests: 50

      # Disable model listing without auth (security)
      allow_requests_on_unmatched_routes: false

    litellm_settings:
      # Drop unmapped params to avoid leaking info
      drop_params: true
      # Request timeout
      request_timeout: 300
      # Enable cost tracking
      success_callback: []
      # Max tokens guard
      max_tokens: 16384

    model_list:
      # ── Anthropic ──
      - model_name: claude-opus-4
        litellm_params:
          model: anthropic/claude-opus-4-20250514
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: claude-sonnet-4
        litellm_params:
          model: anthropic/claude-sonnet-4-20250514
          api_key: os.environ/ANTHROPIC_API_KEY

      - model_name: claude-haiku
        litellm_params:
          model: anthropic/claude-3-5-haiku-20241022
          api_key: os.environ/ANTHROPIC_API_KEY

      # ── OpenAI ──
      - model_name: gpt-4o
        litellm_params:
          model: openai/gpt-4o
          api_key: os.environ/OPENAI_API_KEY

      - model_name: gpt-4o-mini
        litellm_params:
          model: openai/gpt-4o-mini
          api_key: os.environ/OPENAI_API_KEY

      - model_name: o1
        litellm_params:
          model: openai/o1
          api_key: os.environ/OPENAI_API_KEY

      - model_name: o3-mini
        litellm_params:
          model: openai/o3-mini
          api_key: os.environ/OPENAI_API_KEY

      # ── Google Gemini ──
      - model_name: gemini-2.5-flash
        litellm_params:
          model: gemini/gemini-2.5-flash
          api_key: os.environ/GEMINI_API_KEY

      - model_name: gemini-2.5-pro
        litellm_params:
          model: gemini/gemini-2.5-pro
          api_key: os.environ/GEMINI_API_KEY

      - model_name: gemini-2.0-flash
        litellm_params:
          model: gemini/gemini-2.0-flash
          api_key: os.environ/GEMINI_API_KEY

      # ── ZAI / GLM (via BigModel OpenAI-compat) ──
      - model_name: glm-5
        litellm_params:
          model: openai/glm-5
          api_key: os.environ/ZAI_API_KEY
          api_base: https://open.bigmodel.cn/api/paas/v4

      - model_name: glm-4.7
        litellm_params:
          model: openai/glm-4.7
          api_key: os.environ/ZAI_API_KEY
          api_base: https://open.bigmodel.cn/api/paas/v4

      - model_name: glm-4.7-flash
        litellm_params:
          model: openai/glm-4.7-flash
          api_key: os.environ/ZAI_API_KEY
          api_base: https://open.bigmodel.cn/api/paas/v4

      - model_name: glm-4.5-flash
        litellm_params:
          model: openai/glm-4.5-flash
          api_key: os.environ/ZAI_API_KEY
          api_base: https://open.bigmodel.cn/api/paas/v4
