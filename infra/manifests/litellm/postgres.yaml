apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-postgres
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm-postgres
    app.kubernetes.io/instance: litellm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm-postgres
      annotations:
        ambient.istio.io/redirection: disabled
    spec:
      containers:
        - name: postgres
          image: "postgres:16-alpine"
          env:
            - name: POSTGRES_DB
              value: "litellm"
            - name: POSTGRES_USER
              value: "litellm"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: POSTGRES_PASSWORD
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "litellm"]
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "litellm"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: litellm-pgdata
---
apiVersion: v1
kind: Service
metadata:
  name: litellm-postgres
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm-postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: litellm-postgres
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-pgdata
  namespace: litellm
  labels:
    app.kubernetes.io/name: litellm-postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
