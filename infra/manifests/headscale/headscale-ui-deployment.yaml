apiVersion: apps/v1
kind: Deployment
metadata:
  name: headscale-ui
  namespace: headscale
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app.kubernetes.io/name: headscale-ui
    app.kubernetes.io/version: "2026.03.17"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: headscale-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: headscale-ui
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: headscale-ui
          image: ghcr.io/gurucomputing/headscale-ui@sha256:015f5ba04bcbd5ee03178540a1dbbfc97b6896d7411032e3bf33c2f3e08f8b6f
          # Image serves via Caddy on port 8080 (HTTP), not port 80.
          # Confirmed from container logs: "server is listening only on the HTTP port, http_port:8080"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: HEADSCALE_URL
              value: "http://headscale:8080"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
