apiVersion: v1
kind: Service
metadata:
  name: headscale-ui
  namespace: headscale
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app.kubernetes.io/name: headscale-ui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: headscale-ui
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
