apiVersion: apps/v1
kind: Deployment
metadata:
  name: icecast
  namespace: radio-dj
  labels:
    app: icecast
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: icecast
  template:
    metadata:
      labels:
        app: icecast
      annotations:
        # Roll the pod whenever the config template changes (CM is mounted, so
        # a CM edit alone wouldn't restart Icecast). Bump on every icecast.xml change.
        configmap/icecast-config-revision: "2026-06-05-nest-buffers"
    spec:
      nodeSelector:
        kubernetes.io/hostname: vmi3137202
      containers:
        - name: icecast
          image: ghcr.io/binary64/icecast@sha256:03006a86fe005bace521e5b6080400123d05a0b829308c9d8d9e627a85d0d2cb
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8100
              protocol: TCP
          env:
            - name: ICECAST_CONFIG_TEMPLATE
              value: /config/icecast.xml
            - name: ICECAST_SOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: icecast-secret
                  key: source-password
            - name: ICECAST_RELAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: icecast-secret
                  key: relay-password
            - name: ICECAST_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: icecast-secret
                  key: admin-password
            - name: TZ
              value: "Europe/London"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: icecast-config
              mountPath: /config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /status-json.xsl
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: icecast-config
          configMap:
            name: icecast-config
