# radio-dj-secret — Required by the radio-dj deployment.
#
# Create manually before first deploy:
#   kubectl -n radio-dj create secret generic radio-dj-secret \
#     --from-literal=openai-api-key=<key> \
#     --from-literal=icecast-source-password=<password> \
#     --from-literal=icecast-relay-password=<password> \
#     --from-literal=icecast-admin-password=<password> \
#     --from-literal=hume-api-key=<key> \
#     --from-literal=zai-api-key=<key>
#
# Keys:
#   openai-api-key           - OpenAI API key for LLM track selection (required)
#   icecast-source-password  - Liquidsoap → Icecast source auth (required)
#   icecast-relay-password   - Icecast relay auth (required)
#   icecast-admin-password   - Icecast admin panel auth (required)
#   hume-api-key             - Hume AI TTS for DJ commentary (optional)
#   zai-api-key              - ZAI API key (optional)
#
# NOTE: Icecast passwords must not contain XML special characters (&, <, >, ", ')
# unless the entrypoint's XML-escaping handles them (it does as of v0.1.0).
apiVersion: v1
kind: Secret
metadata:
  name: radio-dj-secret
  namespace: radio-dj
type: Opaque
# Values are placeholder — replace before applying or use `kubectl create secret`
stringData:
  openai-api-key: "CHANGE_ME"
  icecast-source-password: "CHANGE_ME"
  icecast-relay-password: "CHANGE_ME"
  icecast-admin-password: "CHANGE_ME"
  hume-api-key: "CHANGE_ME"
  zai-api-key: "CHANGE_ME"
