apiVersion: v1
kind: ConfigMap
metadata:
  name: dj-api-server
  namespace: radio-dj
data:
  server.py: "#!/usr/bin/env python3\nimport http.server\nimport socketserver\nimport\
    \ json\nimport os\nimport subprocess\nimport urllib.request\nimport urllib.error\n\
    \nPORT = int(os.environ.get('API_PORT', '8080'))\nSTATE_DIR = '/state'\nLIQUIDSOAP_HOST\
    \ = os.environ.get('LIQUIDSOAP_HOST', 'liquidsoap.radio-dj.svc.cluster.local')\n\
    LIQUIDSOAP_PORT = os.environ.get('LIQUIDSOAP_PORT', '1234')\nTTS_SERVER_URL =\
    \ os.environ.get('TTS_SERVER_URL', 'http://tts-server.tts-server.svc.cluster.local:3090')\n\
    TTS_AUTH_TOKEN = os.environ.get('TTS_AUTH_TOKEN', '')\n\nclass DJHandler(http.server.BaseHTTPRequestHandler):\n\
    \    def _send_json(self, data, status=200):\n        self.send_response(status)\n\
    \        self.send_header('Content-Type', 'application/json')\n        self.end_headers()\n\
    \        self.wfile.write(json.dumps(data).encode())\n\n    def do_GET(self):\n\
    \        if self.path == '/health':\n            self.send_response(200)\n   \
    \         self.send_header('Content-Type', 'text/plain')\n            self.end_headers()\n\
    \            self.wfile.write(b'OK')\n        elif self.path == '/queue':\n  \
    \          queue_file = os.path.join(STATE_DIR, 'queue.json')\n            if\
    \ os.path.exists(queue_file):\n                with open(queue_file) as f:\n \
    \                   self.send_response(200)\n                    self.send_header('Content-Type',\
    \ 'application/json')\n                    self.end_headers()\n              \
    \      self.wfile.write(f.read().encode())\n            else:\n              \
    \  self._send_json({'queue': []})\n        elif self.path == '/status':\n    \
    \        status_file = os.path.join(STATE_DIR, 'last-dj.json')\n            if\
    \ os.path.exists(status_file):\n                with open(status_file) as f:\n\
    \                    self.send_response(200)\n                    self.send_header('Content-Type',\
    \ 'application/json')\n                    self.end_headers()\n              \
    \      self.wfile.write(f.read().encode())\n            else:\n              \
    \  self._send_json({'status': 'idle'})\n        else:\n            self.send_response(404)\n\
    \            self.end_headers()\n            self.wfile.write(b'Not found')\n\n\
    \    def do_POST(self):\n        if self.path == '/speak':\n            content_len\
    \ = int(self.headers.get('Content-Length', 0))\n            body = self.rfile.read(content_len)\n\
    \            try:\n                data = json.loads(body)\n                text\
    \ = data.get('text', '')\n                voice = data.get('voice', 'cara')\n\
    \            except Exception:\n                self.send_response(400)\n    \
    \            self.end_headers()\n                self.wfile.write(b'Invalid JSON')\n\
    \                return\n\n            if not text:\n                self.send_response(400)\n\
    \                self.end_headers()\n                self.wfile.write(b'Missing\
    \ text')\n                return\n\n            # Call dj-commentary.sh\n    \
    \        proc = subprocess.Popen(\n                ['/radio/dj-commentary.sh',\
    \ voice, 'api-call', text],\n                stdout=subprocess.PIPE, stderr=subprocess.PIPE\n\
    \            )\n            stdout, stderr = proc.communicate(timeout=30)\n  \
    \          if proc.returncode == 0:\n                self._send_json({'status':\
    \ 'queued'})\n            else:\n                self.send_response(500)\n   \
    \             self.send_header('Content-Type', 'text/plain')\n               \
    \ self.end_headers()\n                self.wfile.write(stderr or b'Error')\n \
    \       else:\n            self.send_response(404)\n            self.end_headers()\n\
    \            self.wfile.write(b'Not found')\n\nif __name__ == '__main__':\n  \
    \  with socketserver.TCPServer(('', PORT), DJHandler) as httpd:\n        print(f'DJ\
    \ Brain API listening on :{PORT}')\n        httpd.serve_forever()\n"
