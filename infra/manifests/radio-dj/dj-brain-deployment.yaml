apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: dj-brain
  name: dj-brain
  namespace: radio-dj
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dj-brain
  template:
    metadata:
      labels:
        app: dj-brain
    spec:
      containers:
      - name: dj-brain
        image: ghcr.io/binary64/dj-brain:latest
        imagePullPolicy: Always
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: dj-brain-secret
              key: openai-api-key
        - name: TTS_SERVER_URL
          value: http://tts-server.tts-server.svc.cluster.local:3090
        - name: TTS_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: dj-brain-secret
              key: tts-auth-token
        - name: HUME_API_KEY
          valueFrom:
            secretKeyRef:
              name: dj-brain-secret
              key: hume-api-key
              optional: true
        - name: ZAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: dj-brain-secret
              key: zai-api-key
              optional: true
        - name: LIQUIDSOAP_PORT
          value: '1234'
        - name: TZ
          value: Europe/London
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: state
          mountPath: /state
        - name: dj-watcher-script
          mountPath: /data/radio-dj-script
          readOnly: true
        - name: dj-api-server
          mountPath: /server
          readOnly: true
        - name: dj-override
          mountPath: /data/music/dj-override.json
          readOnly: true
        - name: schedule
          mountPath: /config/schedule.json
          readOnly: true
      volumes:
      - name: state
        emptyDir: {}
      - name: dj-watcher-script
        configMap:
          name: dj-watcher-script
      - name: dj-api-server
        configMap:
          name: dj-api-server
      - name: dj-override
        hostPath:
          path: /mnt/arthur/clawd/data/music/dj-override.json
          type: FileOrCreate
      - name: schedule
        hostPath:
          path: /mnt/arthur/clawd/memory/schedule.json
          type: FileOrCreate
      nodeSelector:
        kubernetes.io/hostname: vmi3137202
