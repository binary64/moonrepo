apiVersion: apps/v1
kind: Deployment
metadata:
  name: dj-brain
  namespace: radio-dj
  labels:
    app: dj-brain
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dj-brain
  template:
    metadata:
      labels:
        app: dj-brain
    spec:
      containers:
      - name: dj-brain
        image: arthur-radio-dj-brain:latest
        command:
        - /bin/bash
        - /data/radio-dj-script/dj-watcher.sh
        env:
        - name: LITELLM_MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-gateway-key
              key: key
        volumeMounts:
        - name: state
          mountPath: /state
        - name: dj-override
          mountPath: /data/music/dj-override.json
        - name: schedule
          mountPath: /config/schedule.json
        - name: dj-watcher-script
          mountPath: /data/radio-dj-script
      volumes:
      - name: state
        emptyDir: {}
      - name: dj-override
        configMap:
          name: dj-override
      - name: schedule
        configMap:
          name: schedule
      - name: dj-watcher-script
        configMap:
          name: dj-watcher-script
