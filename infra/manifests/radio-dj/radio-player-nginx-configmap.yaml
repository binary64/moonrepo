apiVersion: v1
kind: ConfigMap
metadata:
  name: radio-player-nginx-config
  namespace: radio-dj
data:
  default.conf: |    # Default server — catches IP-based access and unknown hostnames
    # ─── Cold-start activator wiring ───
    # When liquidsoap is scaled to zero, Icecast has no /stream mount and a cold
    # listener would get a 404 (never registering as a listener — so we can't
    # use listener-count to wake). Instead every /stream hit fires a
    # non-blocking subrequest to the always-on radio-activator service, which
    # scales liquidsoap 0->1. The activator returns 200 immediately (wake is
    # async), so the listener's own client retry/buffering rides through the
    # ~seconds of cold start while the cold-start muzak covers the handover.
    # mirror=on duplicates the request without blocking the main proxy.
    server {
        listen 80 default_server;
        server_name _;

        # Disable nginx's own cache-control; let Icecast headers through
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header Pragma;

        # Internal location that pings the activator's /wake endpoint.
        location = /__wake {
            internal;
            proxy_pass http://radio-activator.radio-dj.svc.cluster.local:8080/wake;
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout 3s;
        }

        location /stream {
            # Fire-and-forget wake subrequest on every stream hit (idempotent;
            # the activator no-ops when liquidsoap is already up).
            mirror /__wake;
            mirror_request_body off;
            proxy_pass http://icecast.radio-dj.svc.cluster.local:8100/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_method GET;
            proxy_set_header Range "";
            proxy_buffering off;
            proxy_cache off;
            # CORS headers for Cast compatibility
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
            # Pass through Icecast ICY headers
            proxy_pass_header icy-*;
        }

        location = /stream.mp3 {
            mirror /__wake;
            mirror_request_body off;
            proxy_pass http://icecast.radio-dj.svc.cluster.local:8100/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_method GET;
            proxy_set_header Range "";
            proxy_buffering off;
            proxy_cache off;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
            proxy_pass_header icy-*;
        }

        location = /stream-video.ts {
            proxy_pass http://icecast.radio-dj.svc.cluster.local:8100/stream-video;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_method GET;
            proxy_set_header Range "";
            proxy_buffering off;
            proxy_cache off;
            proxy_hide_header Content-Type;
            add_header Content-Type video/mp2t;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
            default_type video/mp2t;
        }
    }

    # Server for player.stream.brandwhisper.cloud — static web content
    server {
        listen 80;
        server_name player.stream.brandwhisper.cloud;
        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri/ =404;
        }
    }

    # Server for stream.brandwhisper.cloud — proxy to Icecast (explicit, overrides default)
    server {
        listen 80;
        server_name stream.brandwhisper.cloud;

        # Disable nginx's own cache-control; let Icecast headers through
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        proxy_hide_header Pragma;

        # Cold-start activator subrequest target (see notes on the default server).
        location = /__wake {
            internal;
            proxy_pass http://radio-activator.radio-dj.svc.cluster.local:8080/wake;
            proxy_set_header Host $host;
            proxy_connect_timeout 2s;
            proxy_read_timeout 3s;
        }

        location /stream {
            mirror /__wake;
            mirror_request_body off;
            proxy_pass http://icecast.radio-dj.svc.cluster.local:8100/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_method GET;
            proxy_set_header Range "";
            proxy_buffering off;
            proxy_cache off;
            # CORS headers for Cast compatibility
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
            # Pass through Icecast ICY headers
            proxy_pass_header icy-*;
        }

        location = /stream.mp3 {
            mirror /__wake;
            mirror_request_body off;
            proxy_pass http://icecast.radio-dj.svc.cluster.local:8100/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_method GET;
            proxy_set_header Range "";
            proxy_buffering off;
            proxy_cache off;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
            proxy_pass_header icy-*;
        }

        location = /stream-video.ts {
            proxy_pass http://icecast.radio-dj.svc.cluster.local:8100/stream-video;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";
            proxy_method GET;
            proxy_set_header Range "";
            proxy_buffering off;
            proxy_cache off;
            proxy_hide_header Content-Type;
            add_header Content-Type video/mp2t;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range, Content-Type" always;
            default_type video/mp2t;
        }
    }

