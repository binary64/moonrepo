apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- namespace.yaml
- icecast-secret.yaml
- icecast-configmap.yaml
- icecast-deployment.yaml
- icecast-service.yaml
- liquidsoap-secret.yaml
- liquidsoap-deployment.yaml
- liquidsoap-service.yaml
- dj-watcher-script-configmap.yaml
- dj-api-server-configmap.yaml
- dj-brain-secret.yaml
- dj-brain-deployment.yaml
- dj-brain-service.yaml
- radio-llm-prompt-configmap.yaml
- litellm-gateway-key-secret.yaml
- radio-activator-rbac.yaml
- radio-activator-deployment.yaml
# Activator HTTP server. Source of truth is apps/radio-activator/activator.py
# (readable/reviewable); the deployed copy is embedded inline in this ConfigMap
# because kustomize/ArgoCD LoadRestrictionsRootOnly forbids generating from a
# file outside this dir. Same pattern as radio-dj.liq + dj-watcher-script.
- radio-activator-configmap.yaml
