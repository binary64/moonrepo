apiVersion: apps/v1
kind: Deployment
metadata:
  name: liquidsoap
  namespace: radio-dj
  labels:
    app: liquidsoap
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: liquidsoap
  template:
    metadata:
      labels:
        app: liquidsoap
    spec:
      nodeSelector:
        kubernetes.io/hostname: vmi3137202
      securityContext:
        fsGroup: 999
      containers:
        - name: liquidsoap
          image: ghcr.io/binary64/liquidsoap:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 1234
              protocol: TCP
          env:
            - name: ICECAST_HOST
              value: "icecast.radio-dj.svc.cluster.local"
            - name: ICECAST_SOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: liquidsoap-secret
                  key: icecast-source-password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: liquidsoap-secret
                  key: openai-api-key
                  optional: true
            - name: TZ
              value: "Europe/London"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: music
              mountPath: /data/music
              readOnly: true
            - name: music-index
              mountPath: /data/music-index
              readOnly: true
            - name: track-graph
              mountPath: /data/radio-track-graph.json
              readOnly: true
            - name: play-history
              mountPath: /data/music/play-history.log
            - name: track-tiers
              mountPath: /data/music/track-tiers.json
              readOnly: true
            - name: dj-override
              mountPath: /data/music/dj-override.json
              readOnly: true
            - name: schedule
              mountPath: /config/schedule.json
              readOnly: true
            - name: state
              mountPath: /state
            - name: llm-prompt
              mountPath: /config/llm-prompt
              readOnly: true
      volumes:
        - name: music
          hostPath:
            path: /mnt/arthur/clawd/data/music
            type: Directory
        - name: music-index
          hostPath:
            path: /mnt/arthur/clawd/data/music-index
            type: Directory
        - name: track-graph
          hostPath:
            path: /mnt/arthur/clawd/data/radio-track-graph.json
            type: File
        - name: play-history
          hostPath:
            path: /mnt/arthur/clawd/data/music/play-history.log
            type: FileOrCreate
        - name: track-tiers
          hostPath:
            path: /mnt/arthur/clawd/data/music/track-tiers.json
            type: File
        - name: dj-override
          hostPath:
            path: /mnt/arthur/clawd/data/music/dj-override.json
            type: File
        - name: schedule
          hostPath:
            path: /mnt/arthur/clawd/memory/schedule.json
            type: File
        - name: state
          hostPath:
            path: /tmp/radio-state
            type: DirectoryOrCreate
        - name: llm-prompt
          configMap:
            name: radio-llm-prompt
