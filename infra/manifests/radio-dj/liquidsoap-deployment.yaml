apiVersion: apps/v1
kind: Deployment
metadata:
  name: liquidsoap
  namespace: radio-dj
  labels:
    app: liquidsoap
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: liquidsoap
  template:
    metadata:
      labels:
        app: liquidsoap
    spec:
      nodeSelector:
        kubernetes.io/hostname: vmi3137202
      securityContext:
        fsGroup: 999
      initContainers:
      - name: chown-state
        image: busybox:1.35
        command:
        - sh
        - -c
        - chown -R 999:999 /state
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: state
          mountPath: /state
      containers:
      - name: liquidsoap
        image: ghcr.io/binary64/liquidsoap:83fe165
        ports:
        - containerPort: 1234
          protocol: TCP
        - containerPort: 8000
          protocol: TCP
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
        env:
        - name: ICECAST_HOST
          value: icecast.radio-dj.svc.cluster.local
        - name: ICECAST_SOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: liquidsoap-secret
              key: icecast-source-password
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: liquidsoap-secret
              key: openai-api-key
              optional: true
        # Hasura play-history logging (announce-track.sh). Without these the
        # insert mutation is unauthenticated -> "no mutations exist" (403) and
        # silently dropped, freezing the radio site's history + now-playing.
        - name: HASURA_URL
          value: http://hasura.hasura.svc.cluster.local:8080/v1/graphql
        - name: HASURA_ADMIN_SECRET
          valueFrom:
            secretKeyRef:
              name: hasura-admin-secret
              key: secret
        - name: TZ
          value: Europe/London
        volumeMounts:
        - name: music
          mountPath: /data/music
          readOnly: true
        - name: muzak
          mountPath: /data/muzak
          readOnly: true
        - name: music-index
          mountPath: /data/music-index
          readOnly: true
        - name: track-graph
          mountPath: /data/radio-track-graph.json
          readOnly: true
        - name: play-history
          mountPath: /data/music/play-history.log
        - name: track-tiers
          mountPath: /data/music/track-tiers.json
          readOnly: true
        - name: dj-override
          mountPath: /data/music/dj-override.json
          readOnly: true
        - name: schedule
          mountPath: /config/schedule.json
          readOnly: true
        - name: llm-prompt
          mountPath: /config/llm-prompt
          readOnly: true
        - name: state
          mountPath: /state
        - name: radio-dj-config
          mountPath: /radio/radio-dj.liq
          subPath: radio-dj.liq
      volumes:
      - name: music
        hostPath:
          path: /mnt/arthur/clawd/data/music
          type: Directory
      - name: muzak
        hostPath:
          # Cheesy cold-start muzak loop. Deploy step: drop a royalty-free
          # elevator-muzak mp3 at this host path named cheesy-muzak.mp3
          # (see PR description). DirectoryOrCreate so the pod still schedules
          # if the file/dir is not present yet — the .liq degrades to silence.
          path: /mnt/arthur/clawd/data/muzak
          type: DirectoryOrCreate
      - name: music-index
        hostPath:
          path: /mnt/arthur/clawd/data/music-index
          type: Directory
      - name: track-graph
        hostPath:
          path: /mnt/arthur/clawd/data/radio-track-graph.json
          type: File
      - name: play-history
        hostPath:
          path: /mnt/arthur/clawd/data/music/play-history.log
          type: FileOrCreate
      - name: track-tiers
        hostPath:
          path: /mnt/arthur/clawd/data/music/track-tiers.json
          type: File
      - name: dj-override
        hostPath:
          path: /mnt/arthur/clawd/data/music/dj-override.json
          type: File
      - name: schedule
        configMap:
          name: schedule
      - name: state
        hostPath:
          path: /tmp/radio-state
          type: DirectoryOrCreate
      - name: llm-prompt
        configMap:
          name: radio-llm-prompt
      - name: radio-dj-config
        configMap:
          name: radio-dj-config
