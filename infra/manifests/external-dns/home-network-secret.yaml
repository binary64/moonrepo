apiVersion: v1
kind: Secret
metadata:
  name: home-network
  namespace: external-dns
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/part-of: infrastructure
type: Opaque
stringData:
  # Home public IP — updated automatically by wan-ip-monitor.
  # DO NOT EDIT — the WAN IP monitor patches this secret when the IP changes
  # and triggers a rollout of the external-dns Deployment so it re-reads the
  # value (env-from-Secret values are not auto-refreshed in running pods).
  public-ip: "REPLACE_WITH_WAN_IP"
