---
# home-network: the SINGLE source of truth for external-dns's --default-targets.
#
# NOTE: this is intentionally a PLAIN Secret, not a SealedSecret. The value is the
# home WAN IP, which is published in public DNS by definition — encrypting it buys
# nothing and actively harms us: a SealedSecret controller re-applies the sealed
# (stale) value on every reconcile, which reverts the wan-ip-monitor's live patches
# and causes DNS to flap (this caused a full external outage on 2026-06-12).
#
# The wan-ip-monitor CronJob (namespace: newrelic) patches .data.public-ip whenever
# the WAN IP changes. ArgoCD is told to ignore .data here (see external-dns-config
# Application's ignoreDifferences) so selfHeal does not fight the monitor. The value
# below is only a seed for first-create / disaster recovery.
apiVersion: v1
kind: Secret
metadata:
  name: home-network
  namespace: external-dns
  annotations:
    moonrepo.dev/skip-local: "true"
type: Opaque
data:
  # 83.105.77.69 (seed only — monitor keeps this current)
  public-ip: ODMuMTA1Ljc3LjY5
