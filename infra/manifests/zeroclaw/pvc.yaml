apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: zeroclaw-data
  namespace: zeroclaw
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/instance: zeroclaw
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Uses default StorageClass (local-path on RKE2)
