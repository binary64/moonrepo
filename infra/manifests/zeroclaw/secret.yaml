# ⚠️ This secret is managed OUT-OF-BAND — real values applied via kubectl.
#
# Apply:
#   kubectl -n zeroclaw create secret generic zeroclaw-env \
#     --from-literal=API_KEY='sk-litellm-...'
apiVersion: v1
kind: Secret
metadata:
  name: zeroclaw-env
  namespace: zeroclaw
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/instance: zeroclaw
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    argocd.argoproj.io/managed-by: manual
type: Opaque
