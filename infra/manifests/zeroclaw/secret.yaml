# ⚠️ PLACEHOLDER — do NOT commit real credentials to this public repo.
#
# Apply the real secret manually:
#   kubectl -n zeroclaw create secret generic zeroclaw-env \
#     --from-literal=API_KEY='sk-litellm-...'
apiVersion: v1
kind: Secret
metadata:
  name: zeroclaw-env
  namespace: zeroclaw
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/instance: zeroclaw
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
type: Opaque
stringData:
  API_KEY: "CHANGE_ME"
