# ⚠️ PLACEHOLDER — do NOT commit real credentials to this public repo.
#
# Apply the real secret manually BEFORE ArgoCD syncs the deployment:
#   kubectl -n zeroclaw create secret generic zeroclaw-env \
#     --from-literal=API_KEY='sk-litellm-your-master-key'
#
# The API_KEY is the LiteLLM master key — ZeroClaw authenticates
# to LiteLLM which then fans out to the real providers.
#
# Or replace this file with a SealedSecret.
apiVersion: v1
kind: Secret
metadata:
  name: zeroclaw-env
  namespace: zeroclaw
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/instance: zeroclaw
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  API_KEY: "CHANGE_ME"
