# ⚠️ PLACEHOLDER — do NOT commit real credentials to this public repo.
#
# Apply the real secret manually BEFORE ArgoCD syncs the deployment:
#   kubectl -n zeroclaw create secret generic zeroclaw-env \
#     --from-literal=API_KEY='your-api-key' \
#     --from-literal=PROVIDER='gemini' \
#     --from-literal=ZEROCLAW_MODEL='gemini-2.5-flash'
#
# Or replace this file with a SealedSecret once kubeseal is configured.
apiVersion: v1
kind: Secret
metadata:
  name: zeroclaw-env
  namespace: zeroclaw
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/instance: zeroclaw
  annotations:
    argocd.argoproj.io/compare-options: IgnoreExtraneous
type: Opaque
stringData:
  API_KEY: "CHANGE_ME"
  PROVIDER: "gemini"
  ZEROCLAW_MODEL: "gemini-2.5-flash"
