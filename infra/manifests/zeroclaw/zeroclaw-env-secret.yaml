# ⚠️  BOOTSTRAP PLACEHOLDER — replace with a SealedSecret before deploying.
# Run: kubectl create secret generic zeroclaw-env -n zeroclaw \
#        --from-literal=API_KEY=<real-key> --dry-run=client -o yaml \
#        | kubeseal --format yaml > zeroclaw-env-sealed-secret.yaml
#
# Until sealed, zeroclaw will start but API calls will fail auth.
apiVersion: v1
kind: Secret
metadata:
  name: zeroclaw-env
  namespace: zeroclaw
type: Opaque
stringData:
  API_KEY: "CHANGEME"
