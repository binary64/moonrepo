apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw
  namespace: zeroclaw
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/instance: zeroclaw
spec:
  replicas: 1
  strategy:
    type: Recreate # Single replica with PVC — no rolling update
  selector:
    matchLabels:
      app.kubernetes.io/name: zeroclaw
      app.kubernetes.io/instance: zeroclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zeroclaw
        app.kubernetes.io/instance: zeroclaw
    spec:
      # Bootstrap the config dir on first start.
      # The PVC mounts at /zeroclaw-data and shadows the image's baked-in config.
      # This initContainer seeds .zeroclaw/config.toml + workspace/ if they are absent,
      # then exits — the main container starts with a valid config every time.
      initContainers:
        - name: init-config
          image: "busybox:1.37"
          imagePullPolicy: IfNotPresent
          command:
            - "/bin/sh"
            - "-c"
            - |
              set -e
              CONFIG_DIR="/zeroclaw-data/.zeroclaw"
              CONFIG_FILE="$CONFIG_DIR/config.toml"
              WORKSPACE="/zeroclaw-data/workspace"
              if [ ! -f "$CONFIG_FILE" ]; then
                mkdir -p "$CONFIG_DIR" "$WORKSPACE"
                cat > "$CONFIG_FILE" <<'TOML'
              workspace_dir = "/zeroclaw-data/workspace"
              api_key = ""
              default_provider = "openrouter"
              default_model = "anthropic/claude-sonnet-4-20250514"
              default_temperature = 0.7

              [gateway]
              port = 42617
              host = "[::]"
              allow_public_bind = true
              TOML
                echo "init-config: seeded $CONFIG_FILE"
              else
                echo "init-config: $CONFIG_FILE already exists, skipping"
              fi
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /zeroclaw-data
      containers:
        - name: zeroclaw
          # TODO: pin to a release digest once upstream publishes versioned tags
          image: "ghcr.io/zeroclaw-labs/zeroclaw:latest"
          imagePullPolicy: Always
          command: ["zeroclaw", "daemon"]
          env:
            # Non-secret config
            - name: ZEROCLAW_ALLOW_PUBLIC_BIND
              value: "true"
            - name: ZEROCLAW_GATEWAY_PORT
              value: "42617"
            # Point config resolution at the PVC so the daemon persists state across restarts
            - name: ZEROCLAW_CONFIG_DIR
              value: "/zeroclaw-data/.zeroclaw"
            - name: HOME
              value: "/zeroclaw-data"
            # LiteLLM proxy — OpenAI-compatible endpoint in-cluster
            # ZeroClaw's "custom:" prefix routes to any OpenAI-compat API
            - name: PROVIDER
              value: "custom:http://litellm.litellm.svc:4000"
            - name: ZEROCLAW_MODEL
              value: "gemini-2.5-flash"
            # LiteLLM master key used as the API key
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-env
                  key: API_KEY
          ports:
            - name: gateway
              containerPort: 42617
              protocol: TCP
          livenessProbe:
            exec:
              command: ["zeroclaw", "status"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["zeroclaw", "status"]
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "25m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /zeroclaw-data
      volumes:
        - name: zeroclaw-data
          persistentVolumeClaim:
            claimName: zeroclaw-data
