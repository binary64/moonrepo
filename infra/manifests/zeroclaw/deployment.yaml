apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeroclaw
  namespace: zeroclaw
  labels:
    app.kubernetes.io/name: zeroclaw
    app.kubernetes.io/instance: zeroclaw
spec:
  replicas: 1
  strategy:
    type: Recreate # Single replica with PVC — no rolling update
  selector:
    matchLabels:
      app.kubernetes.io/name: zeroclaw
      app.kubernetes.io/instance: zeroclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zeroclaw
        app.kubernetes.io/instance: zeroclaw
    spec:
      containers:
        - name: zeroclaw
          # TODO: pin to a release digest once upstream publishes versioned tags
          image: "ghcr.io/zeroclaw-labs/zeroclaw:latest"
          imagePullPolicy: Always
          command: ["zeroclaw", "daemon"]
          env:
            # Non-secret config
            - name: ZEROCLAW_ALLOW_PUBLIC_BIND
              value: "true"
            - name: ZEROCLAW_GATEWAY_PORT
              value: "42617"
            # LiteLLM proxy — OpenAI-compatible endpoint in-cluster
            # ZeroClaw's "custom:" prefix routes to any OpenAI-compat API
            - name: PROVIDER
              value: "custom:http://litellm.litellm.svc:4000"
            - name: ZEROCLAW_MODEL
              value: "gemini-2.5-flash"
            # LiteLLM master key used as the API key
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: zeroclaw-env
                  key: API_KEY
          ports:
            - name: gateway
              containerPort: 42617
              protocol: TCP
          livenessProbe:
            exec:
              command: ["zeroclaw", "status"]
            initialDelaySeconds: 15
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["zeroclaw", "status"]
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: zeroclaw-data
              mountPath: /zeroclaw-data
      volumes:
        - name: zeroclaw-data
          persistentVolumeClaim:
            claimName: zeroclaw-data
