apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptt-server
  namespace: ptt-server
  annotations:
    # Skip local execution — uses hostNetwork, which would bind host ports
    moonrepo.dev/skip-local: "true"
  labels:
    app: ptt-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ptt-server
  template:
    metadata:
      labels:
        app: ptt-server
    spec:
      # Run on Jupiter — needs localhost access to OpenClaw gateway (:18789)
      nodeSelector:
        kubernetes.io/hostname: vmi3137202
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: ptt-server
          # Tag is replaced by the docker.yml GHA workflow on every master push.
          # Do not push this manifest with :latest — use a pinned SHA or semver tag.
          image: ghcr.io/binary64/ptt-server:PLACEHOLDER_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9876
              protocol: TCP
          env:
            - name: PORT
              value: "9876"
            - name: MAIN_SESSION
              value: "agent:main:main"
            - name: HA_URL
              value: "https://home.brandwhisper.cloud"
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: ha-token
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: openai-api-key
            - name: OPENCLAW_GATEWAY_URL
              value: "ws://127.0.0.1:18789"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: gateway-token
            - name: PTT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: ptt-api-token
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 5
            periodSeconds: 10
