apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptt-server
  namespace: ptt-server
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app: ptt-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ptt-server
  template:
    metadata:
      labels:
        app: ptt-server
    spec:
      containers:
        - name: ptt-server
          # Tag is replaced by the docker.yml GHA workflow on every master push.
          # Do not push this manifest with :latest — use a pinned SHA or semver tag.
          image: ghcr.io/binary64/ptt-server:bc3b441
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9876
              protocol: TCP
          env:
            - name: PORT
              value: "9876"
            - name: MAIN_SESSION
              value: "agent:main:main"
            - name: HA_URL
              value: "https://home.brandwhisper.cloud"
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: ha-token
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: openai-api-key
            - name: OPENCLAW_GATEWAY_URL
              # LAN-only: gateway binds 0.0.0.0:18789 on the NUC (192.168.1.201)
              # with token auth. Not internet-routable — acceptable threat model
              # for home lab. Token is in the sealed secret, not the URL.
              value: "ws://192.168.1.201:18789"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: gateway-token
            - name: PTT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: ptt-api-token
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: ptt-quick-commands
              mountPath: /config/registry.json
              subPath: registry.json
              readOnly: true
      volumes:
        - name: ptt-quick-commands
          configMap:
            name: ptt-quick-commands
