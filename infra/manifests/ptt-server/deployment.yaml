apiVersion: apps/v1
kind: Deployment
metadata:
  name: ptt-server
  namespace: ptt-server
  annotations:
    # Skip local execution — uses hostNetwork, which would bind host ports
    moonrepo.dev/skip-local: "true"
  labels:
    app: ptt-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ptt-server
  template:
    metadata:
      labels:
        app: ptt-server
    spec:
      # Run on master (NUC, 192.168.1.201) — watch app connects to 192.168.1.201:30987
      # (NodePort), so the pod must be on the NUC for home-network reachability.
      # The NUC node hostname is stable; if the node is ever reprovisioned, update this.
      # NOTE: OPENCLAW_GATEWAY_URL uses Jupiter's host IP (158.220.90.28) because the
      # gateway runs on Jupiter. Ensure the gateway is bound to 0.0.0.0 (not just
      # 127.0.0.1) on Jupiter, or expose it via a k8s Service/NodePort.
      nodeSelector:
        kubernetes.io/hostname: master
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: ptt-server
          # Tag is replaced by the docker.yml GHA workflow on every master push.
          # Do not push this manifest with :latest — use a pinned SHA or semver tag.
          image: ghcr.io/binary64/ptt-server:a3a45a4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9876
              protocol: TCP
          env:
            - name: PORT
              value: "9876"
            - name: MAIN_SESSION
              value: "agent:main:main"
            - name: HA_URL
              value: "https://home.brandwhisper.cloud"
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: ha-token
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: openai-api-key
            - name: OPENCLAW_GATEWAY_URL
              value: "ws://158.220.90.28:18789"
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: gateway-token
            - name: PTT_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ptt-server-secret
                  key: ptt-api-token
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 9876
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: ptt-quick-commands
              mountPath: /config/registry.json
              subPath: registry.json
              readOnly: true
      volumes:
        - name: ptt-quick-commands
          configMap:
            name: ptt-quick-commands
