# CloudNativePG Cluster for Authentik
#
# CNPG auto-creates:
#   - Secret "authentik-pg-app" with keys: uri, username, password, host, port, dbname
#   - Service "authentik-pg-rw" (read-write endpoint)
#
# Pinned to Jupiter (vmi3137202) for storage and to co-locate with authentik pods.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: authentik-pg
  namespace: authentik
  labels:
    app.kubernetes.io/name: authentik-postgres
    app.kubernetes.io/instance: authentik
spec:
  instances: 1

  # Pin to Jupiter (vmi3137202)
  affinity:
    nodeSelector:
      kubernetes.io/hostname: vmi3137202
    tolerations:
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule

  postgresql:
    pg_hba:
      - host all all all scram-sha-256
    # authentik 2025.10 removed Redis: caching, the embedded proxy outpost, and
    # websockets now all run on Postgres, raising connection usage ~50% (see
    # https://docs.goauthentik.io/releases/2025.10/). The CNPG default of 100
    # connections was being exhausted, starving the readiness probe and
    # crash-looping authentik-server (FATAL: remaining connection slots are
    # reserved for SUPERUSER). authentik holds session-stable LISTEN/advisory-lock
    # connections, so a transaction-mode pooler is unsafe here — give it direct
    # headroom instead. Node has ample RAM (50Gi, no pod limits).
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"

  bootstrap:
    initdb:
      database: authentik
      owner: authentik

  storage:
    size: 4Gi
    storageClass: local-path
