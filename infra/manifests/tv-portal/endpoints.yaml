---
# Explicit Endpoints for tv-portal.
# Points to Jupiter's loopback so that kube-proxy on Jupiter routes
# NodePort 30033 → localhost:3003 (the Next.js tracking app).
apiVersion: v1
kind: Endpoints
metadata:
  name: tv-portal
  namespace: tv-portal
  labels:
    app: tv-portal
subsets:
  - addresses:
      - ip: 127.0.0.1
    ports:
      - name: http
        port: 3003
        protocol: TCP
---
# Explicit Endpoints for bermuda-mapper WebSocket server.
# Points to Jupiter's loopback so that kube-proxy on Jupiter routes
# NodePort 30099 → localhost:8099.
apiVersion: v1
kind: Endpoints
metadata:
  name: bermuda-mapper
  namespace: tv-portal
  labels:
    app: bermuda-mapper
subsets:
  - addresses:
      - ip: 127.0.0.1
    ports:
      - name: ws
        port: 8099
        protocol: TCP
