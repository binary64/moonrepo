apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: authentik-ext-auth
  namespace: istio-system
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: gateway
  action: CUSTOM
  provider:
    name: "authentik"
  rules:
    # Z2M: protect UI but allow API access (Z2M has its own token auth)
    - to:
        - operation:
            hosts:
              - "zigbee.brandwhisper.cloud"
            notPaths:
              - "/api/*"
    # All other protected hosts: full SSO on all paths
    - to:
        - operation:
            hosts:
              - "frigate.brandwhisper.cloud"
              - "mgmt.brandwhisper.cloud"
              - "start.brandwhisper.cloud"
              - "llm.brandwhisper.cloud"
