# RBAC for the quiesce-and-snapshot backup CronJob.
# The controller pod needs to: scale the wealthfolio Deployment down/up, and
# create/watch/delete a throwaway worker pod that mounts the data volume.
# Deliberately scoped to the wealthfolio namespace only, and NO pods/exec
# privilege (cleaner blast radius than an exec-based backup).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wealthfolio-backup
  namespace: wealthfolio
  labels:
    app.kubernetes.io/name: wealthfolio
    app.kubernetes.io/component: backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wealthfolio-backup
  namespace: wealthfolio
  labels:
    app.kubernetes.io/name: wealthfolio
    app.kubernetes.io/component: backup
rules:
  # Scale the app deployment down (quiesce) and back up.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  # Create/observe/clean up the throwaway worker pod that tars /data.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wealthfolio-backup
  namespace: wealthfolio
  labels:
    app.kubernetes.io/name: wealthfolio
    app.kubernetes.io/component: backup
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wealthfolio-backup
subjects:
  - kind: ServiceAccount
    name: wealthfolio-backup
    namespace: wealthfolio
