# Serves the doorbell chime MP3 over the LAN from the master node (NUC, 192.168.1.201)
# so the Nest speaker fetches it locally instead of round-tripping through
# Cloudflare/public ingress — shaves a few hundred ms off doorbell chime latency.
#
# IMPORTANT: the MP3 itself is NOT committed (it is extracted from the Ring app and
# is presumed copyrighted). It lives on the node's filesystem via hostPath at
# /opt/doorbell-chime/ring-chime.mp3 and is provisioned out-of-band (kubectl cp).
# If the file is absent, nginx simply returns 404 and the HA automation can fall
# back to the public-ingress URL.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: doorbell-chime
  namespace: doorbell-chime
  labels:
    app: doorbell-chime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doorbell-chime
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: doorbell-chime
    spec:
      # Run on master (NUC, 192.168.1.201) — the only node on the home LAN
      # the Nest speaker can reach directly.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      # hostNetwork so nginx binds directly to the node's LAN IP:8088,
      # reachable by the Nest speaker (Chromecast) on 192.168.1.0/24.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 8088
              hostPort: 8088
              protocol: TCP
              name: http
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/conf.d
            - name: media
              mountPath: /usr/share/nginx/html
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8088
            initialDelaySeconds: 2
            periodSeconds: 15
            failureThreshold: 3
      volumes:
        - name: conf
          configMap:
            name: doorbell-chime-conf
        # MP3 lives on the node's disk (NOT in git — presumed copyrighted).
        - name: media
          hostPath:
            path: /opt/doorbell-chime
            type: DirectoryOrCreate
