---
# This sealed secret must be generated on the cluster before ArgoCD syncs.
# Run the following command on Jupiter (or a machine with kubeseal + cluster access):
#
#   kubectl create secret generic gha-runner-secret \
#     --namespace gha-runner \
#     --from-literal=access-token=<github-pat-with-repo-scope> \
#     --dry-run=client -o yaml \
#   | kubeseal --format yaml > infra/manifests/gha-runner/gha-runner-secret-sealed.yaml
#
# Then commit the updated file. Do NOT commit plaintext secrets.
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: gha-runner-secret
  namespace: gha-runner
spec:
  encryptedData:
    access-token: REPLACE_WITH_SEALED_VALUE
  template:
    metadata:
      name: gha-runner-secret
      namespace: gha-runner
