apiVersion: v1
kind: Namespace
metadata:
  name: gha-runner
  labels:
    # Privileged PSS required: runner mounts host Docker socket (hostPath Socket)
    # baseline/restricted profiles forbid hostPath volumes
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
