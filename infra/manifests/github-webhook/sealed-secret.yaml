# produce a usable Secret. You MUST replace the placeholders with real kubeseal
# output before deploying. ArgoCD will sync the manifest but the Pod will fail
# to start because the Secret decrypts to nothing.
#
# SEALING REQUIRES: kubeseal CLI + access to the cluster's sealed-secrets
# controller (controller-namespace: sealed-secrets). Run from a machine with
# a valid kubeconfig pointing at the prod cluster:
#
#   kubectl create secret generic github-webhook-secret \
#     --namespace github-webhook \
#     --from-literal=webhook-secret='YOUR_WEBHOOK_SECRET_HERE' \
#     --from-literal=session-key='agent:main:telegram:direct:james' \
#     --dry-run=client -o yaml | \
#   kubeseal --controller-namespace sealed-secrets -o yaml \
#     > infra/manifests/github-webhook/sealed-secret.yaml
#
# webhook-secret must match what you configure in GitHub repo settings.
# Generate a strong secret with: openssl rand -hex 32
#
# TODO: seal this secret before merging / deploying.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: github-webhook-secret
  namespace: github-webhook
  annotations:
    # Skip local execution — sealed secrets require a live cluster sealed-secrets controller
    moonrepo.dev/skip-local: "true"
spec:
  # ⚠️ DEPLOY BLOCKER: run kubeseal before deploying — see instructions above
  encryptedData:
    webhook-secret: REPLACE_WITH_KUBESEAL_OUTPUT
    session-key: REPLACE_WITH_KUBESEAL_OUTPUT
  template:
    metadata:
      name: github-webhook-secret
      namespace: github-webhook
