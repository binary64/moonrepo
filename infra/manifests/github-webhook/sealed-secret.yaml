# Sealed secret for github-webhook namespace.
#
# To re-seal (e.g. rotate the webhook secret or change the session key):
#
#   kubectl create secret generic github-webhook-secret \
#     --namespace github-webhook \
#     --from-literal=webhook-secret="$(openssl rand -hex 32)" \
#     --from-literal=session-key='<REPLACE_WITH_OPENCLAW_SESSION_KEY>' \
#     --dry-run=client -o yaml | \
#   kubeseal --controller-name sealed-secrets \
#     --controller-namespace sealed-secrets -o yaml \
#     > infra/manifests/github-webhook/sealed-secret.yaml
#
# webhook-secret must match what you configure in GitHub repo settings.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: github-webhook-secret
  namespace: github-webhook
  annotations:
    # Skip local execution — sealed secrets require a live cluster sealed-secrets controller
    moonrepo.dev/skip-local: "true"
    # Must be available before application workloads (wave 2)
    argocd.argoproj.io/sync-wave: "-1"
spec:
  encryptedData:
    session-key: 
    webhook-secret: 
  template:
    metadata:
      name: github-webhook-secret
      namespace: github-webhook
