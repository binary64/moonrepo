apiVersion: apps/v1
kind: Deployment
metadata:
  name: ring-mqtt
  namespace: ring-mqtt
  labels:
    app: ring-mqtt
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ring-mqtt
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: ring-mqtt
    spec:
      # Run on master (NUC) — same network as Mosquitto and HA
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          effect: NoSchedule
      # hostNetwork not needed - uses cluster networking
      dnsPolicy: ClusterFirst
      containers:
        - name: ring-mqtt
          # Two-way-audio fork of tsightler/ring-mqtt:5.9.3 — adds a `speak`
          # MQTT command (activateCameraSpeaker + transcodeReturnAudio).
          # Source: infra/manifests/ring-mqtt/image/ (Dockerfile + patches).
          # Pinned by digest for immutability; tag = 5.9.3-twoway-audio-1.
          image: ghcr.io/binary64/ring-mqtt:5.9.3-twoway-audio-1@sha256:3b0a9567be791759986c53eb527c2f372d215e86b573044eb6f13d2b61576b6e
          env:
            # Mosquitto broker (cluster service IP)
            - name: MQTTHOST
              value: "mosquitto.home-assistant.svc"
            - name: MQTTPORT
              value: "1883"
            # Broker auth — Mosquitto runs allow_anonymous=false, so creds
            # are required or it loops on "Connection refused: Not authorized".
            # Same user as zigbee2mqtt; sealed in sealedsecret.yaml.
            - name: MQTTUSER
              valueFrom:
                secretKeyRef:
                  name: ring-mqtt-mqtt
                  key: username
            - name: MQTTPASSWORD
              valueFrom:
                secretKeyRef:
                  name: ring-mqtt-mqtt
                  key: password
            # Web UI for initial Ring auth (port 55123)
            - name: ENABLECAMERAS
              value: "true"
            - name: ENABLEMODES
              value: "true"
            - name: LIVESTREAMUSER
              value: ""
            - name: LIVESTREAMPASSWORD
              value: ""
          ports:
            - containerPort: 55123
              protocol: TCP
              name: web-ui
            - containerPort: 8554
              protocol: TCP
              name: rtsp
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - ring-mqtt.js
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pgrep
                - -f
                - ring-mqtt.js
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: data
          hostPath:
            path: /opt/ring-mqtt/data
            type: DirectoryOrCreate
