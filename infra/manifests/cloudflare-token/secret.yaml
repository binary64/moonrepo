apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-token
  namespace: newrelic
  annotations:
    moonrepo.dev/skip-local: "true"
type: Opaque
stringData:
  # Cloudflare API token with DNS edit permissions for brandwhisper.cloud
  # Value is stored in the passwords sheet (Cloudflare API Key row)
  # To update: kubectl create secret generic cloudflare-token \
  #   --namespace=newrelic \
  #   --from-literal=apiToken='<actual-token>' \
  #   --dry-run=client -o yaml | kubectl apply -f -
  apiToken: "REPLACE_WITH_CLOUDFLARE_API_TOKEN"
