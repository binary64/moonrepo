apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - pvc.yaml
  - sealedsecret.yaml
  - deployment.yaml
  - service.yaml
  - route.yaml

commonAnnotations:
  moonrepo.dev/skip-local: "true"

labels:
  - pairs:
      app.kubernetes.io/name: matter-hub
      app.kubernetes.io/part-of: home-automation
    # Preserve prior commonLabels behaviour (these also landed in the selector).
    includeSelectors: true
