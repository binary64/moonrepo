apiVersion: v1
kind: ConfigMap
metadata:
  name: wan-ip-monitor-script
  namespace: newrelic
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app.kubernetes.io/name: wan-ip-monitor
    app.kubernetes.io/part-of: monitoring
data:
  check-wan-ip.sh: |
    #!/bin/sh
    # WAN IP monitor: keep external-dns/home-network secret current so external-dns
    # reconciles all *.brandwhisper.cloud DNS records to the live home WAN IP.
    #
    # Pipeline:  this script -> patches home-network secret -> external-dns -> Cloudflare
    #
    # Design notes:
    #   - Source of truth for "last IP" is the SECRET ITSELF, not a state file.
    #     (The old hostPath /state file caused readOnly/permission crashloops and
    #      never patched anything — full external outage on 2026-06-12.)
    #   - Safety gate: only patch if ports 80/443 are externally reachable, so a
    #     transient ISP blip can't overwrite a working IP with garbage.
    #   - New Relic telemetry is best-effort; never fail the job on NR errors.
    set -eu

    SA=/var/run/secrets/kubernetes.io/serviceaccount
    TOKEN=$(cat "${SA}/token")
    APISERVER=https://kubernetes.default.svc
    NS=external-dns
    SECRET=home-network

    k_get_ip() {
      curl -fsS --max-time 10 \
        --cacert "${SA}/ca.crt" \
        -H "Authorization: Bearer ${TOKEN}" \
        "${APISERVER}/api/v1/namespaces/${NS}/secrets/${SECRET}" \
        | sed -n 's/.*"public-ip" *: *"\([^"]*\)".*/\1/p' \
        | head -1
    }

    # --- 1. fetch current WAN IP ---
    CURRENT_IP=$(curl -fsS --max-time 10 https://ifconfig.me/ip \
      || curl -fsS --max-time 10 https://api.ipify.org || echo "")
    if [ -z "${CURRENT_IP}" ]; then
      echo "ERROR: failed to fetch WAN IP from any source" >&2
      exit 1
    fi
    echo "Current WAN IP: ${CURRENT_IP}"

    # --- 2. read last-known IP from the secret (base64-decoded) ---
    LAST_B64=$(k_get_ip || echo "")
    if [ -n "${LAST_B64}" ]; then
      LAST_IP=$(echo "${LAST_B64}" | base64 -d 2>/dev/null || echo "")
    else
      LAST_IP=""
    fi
    echo "Secret currently holds: '${LAST_IP}'"

    if [ "${CURRENT_IP}" = "${LAST_IP}" ]; then
      echo "WAN IP unchanged — nothing to do."
      exit 0
    fi

    echo "WAN IP changed: '${LAST_IP}' -> '${CURRENT_IP}'"

    # --- 3. sanity gate: must be a well-formed PUBLIC IPv4 before patching ---
    # Guards against patching garbage (empty, error pages, private/loopback IPs).
    # We deliberately do NOT do an external reachability probe here: the pod sits
    # behind the same NAT as the WAN IP (hairpin issues) and async probe APIs are
    # flaky — a broken gate that blocks every update is worse than no gate.
    if ! echo "${CURRENT_IP}" | grep -Eq '^([0-9]{1,3}\.){3}[0-9]{1,3}$'; then
      echo "WARNING: '${CURRENT_IP}' is not a valid IPv4 — skipping." >&2
      exit 0
    fi
    case "${CURRENT_IP}" in
      10.*|192.168.*|127.*|169.254.*|0.*|255.*) \
        echo "WARNING: '${CURRENT_IP}' is private/reserved — skipping." >&2; exit 0 ;;
      172.1[6-9].*|172.2[0-9].*|172.3[0-1].*) \
        echo "WARNING: '${CURRENT_IP}' is private (172.16/12) — skipping." >&2; exit 0 ;;
    esac
    echo "Sanity gate passed (valid public IPv4)."

    # --- 4. patch the secret (strategic merge, base64 value) ---
    NEW_B64=$(echo -n "${CURRENT_IP}" | base64 | tr -d '\n')
    HTTP=$(curl -sS --max-time 15 -o /tmp/patch.out -w "%{http_code}" \
      --cacert "${SA}/ca.crt" \
      -H "Authorization: Bearer ${TOKEN}" \
      -H "Content-Type: application/strategic-merge-patch+json" \
      -X PATCH \
      --data "{\"data\":{\"public-ip\":\"${NEW_B64}\"}}" \
      "${APISERVER}/api/v1/namespaces/${NS}/secrets/${SECRET}")
    if [ "${HTTP}" != "200" ]; then
      echo "ERROR: secret patch failed (HTTP ${HTTP}):" >&2
      cat /tmp/patch.out >&2 || true
      exit 1
    fi
    echo "✓ home-network secret patched to ${CURRENT_IP} — external-dns will reconcile all records."

    # --- 5. best-effort New Relic telemetry (never fatal) ---
    if [ -n "${NR_ACCOUNT_ID:-}" ] && [ -n "${NR_LICENSE_KEY:-}" ] \
       && [ "${NR_ACCOUNT_ID}" != "REPLACE_WITH_NR_ACCOUNT_ID" ]; then
      TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      PAYLOAD="[{\"eventType\":\"WanIpChange\",\"newIp\":\"${CURRENT_IP}\",\"oldIp\":\"${LAST_IP}\",\"timestamp\":\"${TS}\",\"node\":\"nuc\"}]"
      NR_HTTP=$(curl -sS --max-time 15 -o /dev/null -w "%{http_code}" \
        -X POST -H "Content-Type: application/json" -H "Api-Key: ${NR_LICENSE_KEY}" \
        --data "${PAYLOAD}" \
        "https://insights-collector.eu01.nr-data.net/v1/accounts/${NR_ACCOUNT_ID}/events" || echo "000")
      echo "New Relic telemetry: HTTP ${NR_HTTP} (non-fatal)"
    fi

    echo "Done."
