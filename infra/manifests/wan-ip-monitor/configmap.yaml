apiVersion: v1
kind: ConfigMap
metadata:
  name: wan-ip-monitor-script
  namespace: newrelic
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app.kubernetes.io/name: wan-ip-monitor
    app.kubernetes.io/part-of: monitoring
data:
  check-wan-ip.sh: |
    #!/bin/sh
    set -euo pipefail

    # Validate required env vars
    if [ -z "${NR_ACCOUNT_ID:-}" ] || [ "${NR_ACCOUNT_ID}" = "REPLACE_WITH_NR_ACCOUNT_ID" ]; then
      echo "ERROR: NR_ACCOUNT_ID is not set or is still the placeholder value."
      exit 1
    fi

    if [ -z "${NR_LICENSE_KEY:-}" ]; then
      echo "ERROR: NR_LICENSE_KEY is not set."
      exit 1
    fi

    CLOUDFLARE_ENABLED=false
    if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
      CLOUDFLARE_ENABLED=true
      CLOUDFLARE_ZONE_ID="${CLOUDFLARE_ZONE_ID:-ecb09a98b97ba002587403424405610f}"
    fi

    STATE_DIR="/state"
    STATE_FILE="${STATE_DIR}/last-known-ip"
    NR_ENDPOINT="https://insights-collector.eu01.nr-data.net/v1/accounts/${NR_ACCOUNT_ID}/events"

    mkdir -p "${STATE_DIR}"

    # Fetch current WAN IP
    CURRENT_IP=$(curl -fsS --max-time 10 https://ifconfig.me/ip || curl -fsS --max-time 10 https://api.ipify.org || echo "")

    if [ -z "${CURRENT_IP}" ]; then
      echo "ERROR: Failed to fetch WAN IP"
      exit 1
    fi

    echo "Current WAN IP: ${CURRENT_IP}"

    # Read last known IP
    LAST_IP=""
    if [ -f "${STATE_FILE}" ]; then
      LAST_IP=$(cat "${STATE_FILE}")
    fi

    # Only act if IP has changed
    if [ "${CURRENT_IP}" != "${LAST_IP}" ]; then
      echo "WAN IP changed: '${LAST_IP}' -> '${CURRENT_IP}'"

      TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      PAYLOAD="[{\"eventType\":\"WanIpChange\",\"newIp\":\"${CURRENT_IP}\",\"oldIp\":\"${LAST_IP}\",\"timestamp\":\"${TIMESTAMP}\",\"node\":\"nuc\"}]"

      HTTP_STATUS=$(curl -sS --max-time 15 \
        -X POST \
        -H "Content-Type: application/json" \
        -H "Api-Key: ${NR_LICENSE_KEY}" \
        --data "${PAYLOAD}" \
        --write-out "%{http_code}" \
        --output /dev/null \
        "${NR_ENDPOINT}") || true

      if [ "${HTTP_STATUS}" = "200" ]; then
        echo "✓ Event sent to New Relic (HTTP ${HTTP_STATUS})"
      else
        echo "WARNING: New Relic API returned HTTP ${HTTP_STATUS} — continuing anyway"
      fi

      # Update Cloudflare DNS if configured
      if [ "${CLOUDFLARE_ENABLED}" = "true" ]; then
        echo "Updating Cloudflare DNS records..."

        for RECORD in \
          argocd.brandwhisper.cloud \
          authentik.brandwhisper.cloud \
          "*.brandwhisper.cloud" \
          frigate.brandwhisper.cloud \
          github-webhook.brandwhisper.cloud \
          hasura.brandwhisper.cloud \
          headscale-ui.brandwhisper.cloud \
          hrms.brandwhisper.cloud \
          jellyfin.brandwhisper.cloud \
          llm.brandwhisper.cloud \
          mgmt.brandwhisper.cloud \
          open-webui.brandwhisper.cloud \
          radio.brandwhisper.cloud \
          rancher.brandwhisper.cloud \
          start.brandwhisper.cloud; do
          echo "  → ${RECORD}"
          UPDATE_RESPONSE=$(curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records?name=${RECORD}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"${RECORD}\",\"content\":\"${CURRENT_IP}\",\"ttl\":60,\"proxied\":true}")

          if echo "${UPDATE_RESPONSE}" | grep -q '"success":true'; then
            echo "    ✓ updated"
          else
            echo "    ✗ update failed: ${UPDATE_RESPONSE}" >&2
          fi
        done
      fi


      # Persist the new IP
      echo "${CURRENT_IP}" > "${STATE_FILE}"
      echo "✓ State file updated."
    else
      echo "WAN IP unchanged: ${CURRENT_IP}"
    fi

    echo "Done."
