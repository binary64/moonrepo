apiVersion: v1
kind: ConfigMap
metadata:
  name: wan-ip-monitor-script
  namespace: newrelic
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app.kubernetes.io/name: wan-ip-monitor
    app.kubernetes.io/part-of: monitoring
data:
  check-wan-ip.sh: |
    #!/bin/sh
    # POSIX sh — curlimages/curl uses BusyBox ash. Stick to `set -eu` and
    # avoid pipefail (not available in dash/ash everywhere). We explicitly
    # capture exit codes where pipelines matter.
    set -eu

    # Validate required env vars
    if [ -z "${NR_ACCOUNT_ID:-}" ] || [ "${NR_ACCOUNT_ID}" = "REPLACE_WITH_NR_ACCOUNT_ID" ]; then
      echo "ERROR: NR_ACCOUNT_ID is not set or is still the placeholder value."
      exit 1
    fi

    if [ -z "${NR_LICENSE_KEY:-}" ]; then
      echo "ERROR: NR_LICENSE_KEY is not set."
      exit 1
    fi

    CLOUDFLARE_ENABLED=false
    if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
      if [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
        echo "ERROR: CLOUDFLARE_API_TOKEN set but CLOUDFLARE_ZONE_ID is empty."
        exit 1
      fi
      CLOUDFLARE_ENABLED=true
    fi

    STATE_DIR="/state"
    STATE_FILE="${STATE_DIR}/last-known-ip"
    NR_ENDPOINT="https://insights-collector.eu01.nr-data.net/v1/accounts/${NR_ACCOUNT_ID}/events"

    mkdir -p "${STATE_DIR}"

    # Fetch current WAN IP
    CURRENT_IP=$(curl -fsS --max-time 10 https://ifconfig.me/ip || curl -fsS --max-time 10 https://api.ipify.org || echo "")

    if [ -z "${CURRENT_IP}" ]; then
      echo "ERROR: Failed to fetch WAN IP"
      exit 1
    fi

    echo "Current WAN IP: ${CURRENT_IP}"

    # Read last known IP
    LAST_IP=""
    if [ -f "${STATE_FILE}" ]; then
      LAST_IP=$(cat "${STATE_FILE}")
    fi

    # Only act if IP has changed
    if [ "${CURRENT_IP}" != "${LAST_IP}" ]; then
      echo "WAN IP changed: '${LAST_IP}' -> '${CURRENT_IP}'"

      TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      PAYLOAD="[{\"eventType\":\"WanIpChange\",\"newIp\":\"${CURRENT_IP}\",\"oldIp\":\"${LAST_IP}\",\"timestamp\":\"${TIMESTAMP}\",\"node\":\"nuc\"}]"

      HTTP_STATUS=$(curl -sS --max-time 15 \
        -X POST \
        -H "Content-Type: application/json" \
        -H "Api-Key: ${NR_LICENSE_KEY}" \
        --data "${PAYLOAD}" \
        --write-out "%{http_code}" \
        --output /dev/null \
        "${NR_ENDPOINT}")

      if [ "${HTTP_STATUS}" = "200" ]; then
        echo "✓ Event sent to New Relic (HTTP ${HTTP_STATUS})"
      else
        echo "ERROR: New Relic API returned HTTP ${HTTP_STATUS}"
        exit 1
      fi

      # Track whether every downstream side-effect succeeded; only persist
      # state (last-known-ip) on full success so a partial failure retries
      # on the next scheduled run.
      ALL_OK=true

      # Update Cloudflare DNS if configured.
      # Cloudflare's API requires:
      #   GET  /zones/{zone}/dns_records?name=<fqdn>   -> extract record id
      #   PATCH /zones/{zone}/dns_records/{id}         -> update content
      # PUT-ing to the collection with ?name= is NOT the documented update path.
      if [ "${CLOUDFLARE_ENABLED}" = "true" ]; then
        echo "Updating Cloudflare DNS records..."

        for RECORD in headscale.brandwhisper.cloud home.brandwhisper.cloud; do
          echo "  → ${RECORD}"

          LIST_RESPONSE=$(curl -sS --max-time 15 \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records?type=A&name=${RECORD}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")

          # Extract first record id without requiring jq (BusyBox grep/sed).
          RECORD_ID=$(printf '%s' "${LIST_RESPONSE}" \
            | sed -n 's/.*"result":\[{"id":"\([^"]*\)".*/\1/p' \
            | head -n1)

          if [ -z "${RECORD_ID}" ]; then
            echo "    ✗ could not find record id for ${RECORD}: ${LIST_RESPONSE}" >&2
            ALL_OK=false
            continue
          fi

          UPDATE_RESPONSE=$(curl -sS --max-time 15 -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${RECORD_ID}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"content\":\"${CURRENT_IP}\",\"ttl\":60,\"proxied\":false}")

          if echo "${UPDATE_RESPONSE}" | grep -q '"success":true'; then
            echo "    ✓ updated (${RECORD_ID})"
          else
            echo "    ✗ update failed: ${UPDATE_RESPONSE}" >&2
            ALL_OK=false
          fi
        done
      fi

      # Update the rke2-config ConfigMap by rewriting the SINGLE
      # `data.config.yaml` key. Do NOT use --from-literal=advertise-address=...
      # etc. — that replaces .data wholesale with flat keys and breaks
      # apply-rke2-config.sh (which reads {.data.config\.yaml}).
      echo "Updating rke2-config ConfigMap (data.config.yaml)..."

      NEW_CONFIG=$(cat <<EOF
    write-kubeconfig-to: /etc/rancher/rke2/rke2.yaml
    tls-san:
      - ${CURRENT_IP}
      - 192.168.1.201
    node-external-ip: ${CURRENT_IP}
    advertise-address: ${CURRENT_IP}
    EOF
    )

      if kubectl create configmap rke2-config \
          --namespace=default \
          --from-literal=config.yaml="${NEW_CONFIG}" \
          -o yaml --dry-run=client | kubectl apply -f -; then
        echo "✓ rke2-config ConfigMap updated (data.config.yaml preserved)."
        echo "  Run ./infra/manifests/rke2-config/apply-rke2-config.sh --restart on the NUC to apply."
      else
        echo "ERROR: failed to update rke2-config ConfigMap" >&2
        ALL_OK=false
      fi

      # Persist the new IP only if everything above succeeded. Otherwise the
      # next tick will re-detect the "change" and retry the failed step.
      if [ "${ALL_OK}" = "true" ]; then
        echo "${CURRENT_IP}" > "${STATE_FILE}"
        echo "✓ State file updated."
      else
        echo "⚠ Not persisting new IP — one or more updates failed; will retry." >&2
        exit 1
      fi
    else
      echo "WAN IP unchanged: ${CURRENT_IP}"
    fi

    echo "Done."
