apiVersion: v1
kind: ConfigMap
metadata:
  name: wan-ip-monitor-script
  namespace: newrelic
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app.kubernetes.io/name: wan-ip-monitor
    app.kubernetes.io/part-of: monitoring
data:
  check-wan-ip.sh: |
    #!/bin/sh
    set -euo pipefail

    # Validate required env vars
    if [ -z "${NR_ACCOUNT_ID:-}" ] || [ "${NR_ACCOUNT_ID}" = "REPLACE_WITH_NR_ACCOUNT_ID" ]; then
      echo "ERROR: NR_ACCOUNT_ID is not set or is still the placeholder value."
      exit 1
    fi

    if [ -z "${NR_LICENSE_KEY:-}" ]; then
      echo "ERROR: NR_LICENSE_KEY is not set."
      exit 1
    fi

    CLOUDFLARE_ENABLED=false
    if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
      if [ -z "${CLOUDFLARE_ZONE_ID:-}" ]; then
        echo "ERROR: CLOUDFLARE_ZONE_ID is required when CLOUDFLARE_API_TOKEN is set." >&2
        exit 1
      fi
      CLOUDFLARE_ENABLED=true
    fi

    STATE_DIR="/state"
    STATE_FILE="${STATE_DIR}/last-known-ip"
    NR_ENDPOINT="https://insights-collector.eu01.nr-data.net/v1/accounts/${NR_ACCOUNT_ID}/events"

    mkdir -p "${STATE_DIR}"

    # Fetch current WAN IP
    CURRENT_IP=$(curl -fsS --max-time 10 https://ifconfig.me/ip || curl -fsS --max-time 10 https://api.ipify.org || echo "")

    if [ -z "${CURRENT_IP}" ]; then
      echo "ERROR: Failed to fetch WAN IP"
      exit 1
    fi

    echo "Current WAN IP: ${CURRENT_IP}"

    # Read last known IP
    LAST_IP=""
    if [ -f "${STATE_FILE}" ]; then
      LAST_IP=$(cat "${STATE_FILE}")
    fi

    # Only act if IP has changed
    if [ "${CURRENT_IP}" != "${LAST_IP}" ]; then
      echo "WAN IP changed: '${LAST_IP}' -> '${CURRENT_IP}'"

      TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      PAYLOAD="[{\"eventType\":\"WanIpChange\",\"newIp\":\"${CURRENT_IP}\",\"oldIp\":\"${LAST_IP}\",\"timestamp\":\"${TIMESTAMP}\",\"node\":\"nuc\"}]"

      HTTP_STATUS=$(curl -sS --max-time 15 \
        -X POST \
        -H "Content-Type: application/json" \
        -H "Api-Key: ${NR_LICENSE_KEY}" \
        --data "${PAYLOAD}" \
        --write-out "%{http_code}" \
        --output /dev/null \
        "${NR_ENDPOINT}") || true

      if [ "${HTTP_STATUS}" = "200" ]; then
        echo "✓ Event sent to New Relic (HTTP ${HTTP_STATUS})"
      else
        echo "WARNING: New Relic API returned HTTP ${HTTP_STATUS} — continuing anyway"
      fi

      # Track success across all external updates; only persist last-known-ip
      # if every step succeeds, so transient failures get retried next tick.
      ALL_OK=true

      # Update Cloudflare DNS if configured
      if [ "${CLOUDFLARE_ENABLED}" = "true" ]; then
        echo "Updating Cloudflare DNS records..."

        for RECORD in headscale.brandwhisper.cloud home.brandwhisper.cloud; do
          echo "  → ${RECORD}"

          # Step 1: look up the record id (PUT/PATCH require it in the path).
          LIST_RESPONSE=$(curl -sS -G \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records" \
            --data-urlencode "type=A" \
            --data-urlencode "name=${RECORD}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json")

          if ! echo "${LIST_RESPONSE}" | grep -q '"success":true'; then
            echo "    ✗ list failed: ${LIST_RESPONSE}" >&2
            ALL_OK=false
            continue
          fi

          RECORD_ID=$(echo "${LIST_RESPONSE}" \
            | sed -n 's/.*"result":\[{"id":"\([^"]*\)".*/\1/p')

          if [ -z "${RECORD_ID}" ]; then
            echo "    ✗ no record id returned for ${RECORD}: ${LIST_RESPONSE}" >&2
            ALL_OK=false
            continue
          fi

          # Step 2: PATCH the specific record by id.
          UPDATE_RESPONSE=$(curl -sS -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${RECORD_ID}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"A\",\"name\":\"${RECORD}\",\"content\":\"${CURRENT_IP}\",\"ttl\":60,\"proxied\":false}")

          if echo "${UPDATE_RESPONSE}" | grep -q '"success":true'; then
            echo "    ✓ updated"
          else
            echo "    ✗ update failed: ${UPDATE_RESPONSE}" >&2
            ALL_OK=false
          fi
        done
      fi

      # Patch the rke2-config ConfigMap with new WAN IP.
      #
      # The rke2-config ConfigMap stores a single `config.yaml` blob (read by
      # apply-rke2-config.sh via `jsonpath={.data.config\.yaml}`), so we must
      # NOT flatten the keys. Instead, fetch the current config.yaml, replace
      # IP-bearing lines, and re-apply.
      echo "Updating rke2-config ConfigMap..."
      EXISTING_CONFIG=$(kubectl get configmap rke2-config -n default \
        -o jsonpath='{.data.config\.yaml}' 2>/dev/null || echo "")

      if [ -z "${EXISTING_CONFIG}" ]; then
        echo "WARNING: rke2-config ConfigMap not found or empty — generating from scratch"
        NEW_CONFIG=$(printf '%s\n' \
          "write-kubeconfig-to: /etc/rancher/rke2/rke2.yaml" \
          "tls-san:" \
          "  - ${CURRENT_IP}" \
          "  - 192.168.1.201" \
          "node-external-ip: ${CURRENT_IP}" \
          "advertise-address: ${CURRENT_IP}")
      else
        # Replace any prior WAN IP token (LAST_IP if known, else the
        # REPLACE_WITH_WAN_IP placeholder from the seed manifest) with the
        # current WAN IP. The LAN tls-san (192.168.1.201) is preserved.
        OLD_TOKEN="${LAST_IP:-REPLACE_WITH_WAN_IP}"
        if [ -z "${OLD_TOKEN}" ]; then
          OLD_TOKEN="REPLACE_WITH_WAN_IP"
        fi
        # Use awk to rewrite only the IP-bearing fields, leaving everything
        # else (including the LAN tls-san entry) untouched.
        NEW_CONFIG=$(printf '%s\n' "${EXISTING_CONFIG}" | awk -v old="${OLD_TOKEN}" -v new="${CURRENT_IP}" '
          /^node-external-ip:/      { print "node-external-ip: " new; next }
          /^advertise-address:/     { print "advertise-address: " new; next }
          /^[[:space:]]*-[[:space:]]*/ {
            line = $0
            gsub(old, new, line)
            print line
            next
          }
          { print }
        ')
      fi

      printf '%s\n' "${NEW_CONFIG}" | kubectl create configmap rke2-config \
        --namespace=default \
        --from-file=config.yaml=/dev/stdin \
        --dry-run=client -o yaml | kubectl apply -f -
      echo "✓ rke2-config ConfigMap updated."

      # Patch the Istio Gateway address
      echo "Updating Istio Gateway address..."
      if kubectl patch gateway gateway -n istio-system --type='merge' -p="{\"spec\":{\"addresses\":[{\"type\":\"IPAddress\",\"value\":\"${CURRENT_IP}\"}]}}"; then
        echo "✓ Istio Gateway updated."
      else
        echo "WARNING: Failed to patch Istio Gateway — may need manual update" >&2
        ALL_OK=false
      fi

      # Patch the external-dns home-network secret AND roll the deployment so
      # the new public-ip is picked up immediately (env-from-Secret values are
      # not refreshed in running pods until restart).
      echo "Updating external-dns home-network secret..."
      if kubectl patch secret home-network -n external-dns --type='merge' -p="{\"stringData\":{\"public-ip\":\"${CURRENT_IP}\"}}"; then
        echo "✓ external-dns secret updated."
        if kubectl rollout restart deployment external-dns -n external-dns 2>/dev/null; then
          echo "✓ external-dns rollout restarted."
        else
          echo "WARNING: Failed to restart external-dns deployment — may keep using stale IP until pod recycle" >&2
          ALL_OK=false
        fi
      else
        echo "WARNING: Failed to patch home-network secret — may need manual update" >&2
        ALL_OK=false
      fi

      # Persist the new IP only if every external update succeeded — otherwise
      # the next tick will retry instead of latching a partially-applied state.
      if [ "${ALL_OK}" = "true" ]; then
        echo "${CURRENT_IP}" > "${STATE_FILE}"
        echo "✓ State file updated."
      else
        echo "✗ One or more updates failed — NOT persisting last-known-ip; will retry next tick." >&2
      fi
      echo ""
      echo "NEXT: Run ./infra/manifests/rke2-config/apply-rke2-config.sh --restart on the NUC to apply RKE2 config."
    else
      echo "WAN IP unchanged: ${CURRENT_IP}"
    fi

    echo "Done."
