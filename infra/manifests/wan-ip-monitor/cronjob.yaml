apiVersion: batch/v1
kind: CronJob
metadata:
  name: wan-ip-monitor
  namespace: newrelic
  annotations:
    moonrepo.dev/skip-local: "true"
  labels:
    app.kubernetes.io/name: wan-ip-monitor
    app.kubernetes.io/part-of: monitoring
spec:
  # Run every 5 minutes
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: wan-ip-monitor
        spec:
          serviceAccountName: wan-ip-monitor
          # Must run on the NUC (master node) — only node with real WAN access
          nodeSelector:
            node-role.kubernetes.io/master: "true"
          tolerations:
            - key: node-role.kubernetes.io/master
              effect: NoSchedule
              operator: Exists
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists
          restartPolicy: OnFailure
          automountServiceAccountToken: true
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            # hostPath dirs created via DirectoryOrCreate are owned root:root 0755.
            # The main container runs as UID 1000 with readOnlyRootFilesystem, so it
            # cannot write to /state. fsGroup does NOT apply to hostPath volumes.
            # This init container fixes ownership/permissions on the hostPath.
            - name: init-perms
              image: bitnami/kubectl:1.31.4
              command:
                - /bin/sh
                - -c
                - chown 1000:1000 /state && chmod 0775 /state
              securityContext:
                runAsNonRoot: false
                runAsUser: 0
                runAsGroup: 0
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
                  add:
                    - CHOWN
                    - FOWNER
              volumeMounts:
                - name: state
                  mountPath: /state
          containers:
            - name: wan-ip-monitor
              # Image must include both `curl` (for IP/DNS API calls) and
              # `kubectl` (for patching rke2-config + Istio Gateway + secrets).
              # bitnami/kubectl ships both. Pinned tag — never use `latest`.
              image: bitnami/kubectl:1.31.4
              command:
                - /bin/bash
                - /scripts/check-wan-ip.sh
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                - name: NR_LICENSE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: newrelic-secret
                      key: licenseKey
                - name: NR_ACCOUNT_ID
                  valueFrom:
                    configMapKeyRef:
                      name: wan-ip-monitor-config
                      key: NR_ACCOUNT_ID
                - name: CLOUDFLARE_API_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cloudflare-token
                      key: apiToken
                - name: CLOUDFLARE_ZONE_ID
                  valueFrom:
                    configMapKeyRef:
                      name: wan-ip-monitor-config
                      key: CLOUDFLARE_ZONE_ID
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: state
                  mountPath: /state
          volumes:
            - name: scripts
              configMap:
                name: wan-ip-monitor-script
                defaultMode: 0755
            - name: state
              hostPath:
                path: /tmp/wan-ip-monitor
                type: DirectoryOrCreate
