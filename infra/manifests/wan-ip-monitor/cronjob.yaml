apiVersion: batch/v1
kind: CronJob
metadata:
  name: wan-ip-monitor
  namespace: newrelic
spec:
  # Run every 5 minutes
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          # Must run on the NUC (master node) — only node with real WAN access
          nodeSelector:
            node-role.kubernetes.io/master: "true"
          tolerations:
            - key: node-role.kubernetes.io/master
              effect: NoSchedule
              operator: Exists
            - key: node-role.kubernetes.io/control-plane
              effect: NoSchedule
              operator: Exists
          restartPolicy: OnFailure
          containers:
            - name: wan-ip-monitor
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - /scripts/check-wan-ip.sh
              env:
                - name: NR_LICENSE_KEY
                  valueFrom:
                    secretKeyRef:
                      name: newrelic-secret
                      key: licenseKey
                - name: NR_ACCOUNT_ID
                  valueFrom:
                    configMapKeyRef:
                      name: wan-ip-monitor-config
                      key: NR_ACCOUNT_ID
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 100m
                  memory: 64Mi
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: state
                  mountPath: /state
          volumes:
            - name: scripts
              configMap:
                name: wan-ip-monitor-script
                defaultMode: 0755
            - name: state
              hostPath:
                path: /tmp/wan-ip-monitor
                type: DirectoryOrCreate
