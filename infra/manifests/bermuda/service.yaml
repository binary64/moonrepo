---
# bermuda-mapper: WebSocket server running on Jupiter (vmi3137202) as a systemd
# service at localhost:8099.  There is no pod — traffic is routed via an explicit
# Endpoints object that points to Jupiter's loopback address.  Because kube-proxy
# runs on every node (including Jupiter) the NodePort listener on Jupiter's eth0
# will forward traffic directly to 127.0.0.1:8099 on that same host.
apiVersion: v1
kind: Service
metadata:
  name: bermuda-mapper
  namespace: bermuda
  labels:
    app: bermuda-mapper
spec:
  type: NodePort
  # No selector — endpoints are managed manually
  ports:
    - name: ws
      port: 8099
      targetPort: 8099
      nodePort: 30099
      protocol: TCP
