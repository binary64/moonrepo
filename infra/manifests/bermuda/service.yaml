---
# bermuda-mapper: WebSocket server running on Jupiter (vmi3137202) as a systemd
# service at 158.220.90.28:8099.  There is no pod — traffic is routed via an
# explicit Endpoints object that points to Jupiter's real IP (158.220.90.28).
# The NodePort listener forwards traffic to the node IP endpoint on port 8099.
apiVersion: v1
kind: Service
metadata:
  name: bermuda-mapper
  namespace: bermuda
  labels:
    app: bermuda-mapper
spec:
  type: NodePort
  # No selector — endpoints are managed manually
  ports:
    - name: ws
      port: 8099
      targetPort: 8099
      nodePort: 30099
      protocol: TCP
