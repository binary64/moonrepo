---
# Explicit Endpoints for bermuda-mapper WebSocket server.
# Points to Jupiter's real node IP (158.220.90.28) so Endpoints work
# cluster-wide, not just node-local. NodePort 30099 → 158.220.90.28:8099.
apiVersion: v1
kind: Endpoints
metadata:
  name: bermuda-mapper
  namespace: bermuda
  labels:
    app: bermuda-mapper
subsets:
  - addresses:
      - ip: 158.220.90.28
    ports:
      - name: ws
        port: 8099
        protocol: TCP
