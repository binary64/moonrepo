---
# Explicit Endpoints for bermuda-mapper WebSocket server.
# Points to Jupiter's loopback so that kube-proxy on Jupiter routes
# NodePort 30099 → localhost:8099.
apiVersion: v1
kind: Endpoints
metadata:
  name: bermuda-mapper
  namespace: bermuda
  labels:
    app: bermuda-mapper
subsets:
  - addresses:
      - ip: 127.0.0.1
    ports:
      - name: ws
        port: 8099
        protocol: TCP
