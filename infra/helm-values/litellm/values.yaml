db:
  deployStandalone: false
  useExisting: false
environmentSecrets:
- litellm-env
- litellm-auth-env
extraEnvVars:
- name: DATABASE_URL
  valueFrom:
    secretKeyRef:
      key: uri
      name: litellm-pg-app
- name: PYTHONPATH
  value: /etc/litellm
extraResources:
- apiVersion: gateway.networking.k8s.io/v1
  kind: HTTPRoute
  metadata:
    name: litellm
    namespace: litellm
  spec:
    hostnames:
    - llm.brandwhisper.cloud
    parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: gateway
      namespace: istio-system
      sectionName: https
    rules:
    - backendRefs:
      - group: ''
        kind: Service
        name: litellm
        port: 4000
        weight: 1
      matches:
      - path:
          type: PathPrefix
          value: /
image:
  pullPolicy: IfNotPresent
  repository: litellm/litellm
  tag: v1.82.3-stable.patch.2
ingress:
  enabled: false
livenessProbe:
  failureThreshold: 3
  initialDelaySeconds: 0
  path: /health/liveliness
  periodSeconds: 10
migrationJob:
  backoffLimit: 4
  enabled: false
  hooks:
    argocd:
      enabled: false
    helm:
      enabled: false
  retries: 3
  ttlSecondsAfterFinished: 120
nodeSelector:
  kubernetes.io/hostname: vmi3137202
proxy_config:
  general_settings:
    allow_requests_on_unmatched_routes: false
    forward_client_headers_to_llm_api: false
    global_max_parallel_requests: 6
    master_key: os.environ/LITELLM_MASTER_KEY
    max_parallel_requests: 4
    store_model_in_db: true
    store_prompts_in_spend_logs: true
  litellm_settings:
    callbacks: hooks.proxy_handler_instance
    drop_params: true
    max_tokens: 36384
    request_timeout: 300
    success_callback: []
  model_list:
  - litellm_params:
      model: anthropic/claude-opus-4-6
    model_name: claude-opus-4-6
  - litellm_params:
      model: anthropic/claude-sonnet-4-6
    model_name: claude-sonnet-4-6
  - litellm_params:
      model: anthropic/claude-haiku-4-5
    model_name: claude-haiku-4-5
  - litellm_params:
      model: anthropic/claude-opus-4-7
      model_info:
        mode: chat
        supports_reasoning: true
      thinking:
        output_config:
          effort: high
        type: adaptive
    model_name: claude-opus-4-7
  - litellm_params:
      api_key: os.environ/GEMINI_API_KEY
      model: gemini/gemini-3-flash-preview
    model_info:
      input_cost_per_token: 5.0e-07
      output_cost_per_token: 3.0e-06
    model_name: gemini-3-flash-preview
  - litellm_params:
      api_key: os.environ/GEMINI_API_KEY
      model: gemini/gemini-3.1-pro-preview
    model_info:
      input_cost_per_token: 2.0e-06
      output_cost_per_token: 1.2e-05
    model_name: gemini-3.1-pro-preview
  - litellm_params:
      api_key: os.environ/GEMINI_API_KEY
      model: gemini/gemini-3.1-flash-lite-preview
    model_info:
      input_cost_per_token: 2.5e-07
      output_cost_per_token: 1.5e-06
    model_name: gemini-3.1-flash-lite-preview
  - litellm_params:
      api_key: os.environ/GEMINI_API_KEY
      model: gemini/gemini-3.1-flash-image-preview
    model_info:
      input_cost_per_token: 5.0e-07
      output_cost_per_token: 3.0e-06
    model_name: gemini-3.1-flash-image-preview
  - litellm_params:
      api_base: https://api.z.ai/api/coding/paas/v4
      api_key: os.environ/ZAI_API_KEY
      model: zai/glm-5
    model_info:
      input_cost_per_token: 1.0e-08
      output_cost_per_token: 1.0e-08
    model_name: glm-5
  - litellm_params:
      api_base: https://api.z.ai/api/coding/paas/v4
      api_key: os.environ/ZAI_API_KEY
      model: zai/glm-4.7
    model_info:
      input_cost_per_token: 1.0e-08
      output_cost_per_token: 1.0e-08
    model_name: glm-4.7
  - litellm_params:
      model: openrouter/google/gemma-2-9b-it
    model_name: gemma-2-9b
  - litellm_params:
      model: openrouter/google/gemma-2-27b-it
    model_name: gemma-2-27b
  - litellm_params:
      model: openrouter/google/gemma-2-2b-it
    model_name: gemma-2-2b
  - litellm_params:
