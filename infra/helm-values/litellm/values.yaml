readinessProbe:
  failureThreshold: 3
  initialDelaySeconds: 0
  path: /health/readiness
  periodSeconds: 10
replicaCount: 1
resources:
  limits:
    memory: 2Gi
  requests:
    cpu: 200m
    memory: 512Mi
service:
  nodePort: 31100
  port: 4000
  type: NodePort
startupProbe:
  failureThreshold: 30
  initialDelaySeconds: 10
  path: /health/readiness
  periodSeconds: 10
volumeMounts:
- mountPath: /etc/litellm/hooks.py
  name: hooks
  readOnly: true
  subPath: hooks.py
volumes:
- configMap:
    name: litellm-hooks
  name: hooks
