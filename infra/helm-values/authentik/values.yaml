authentik:
  secret_key: "" # Override via AUTHENTIK_SECRET_KEY env from authentik-secret-key Secret
  postgresql:
    host: "authentik-pg-rw"
    port: 5432
    database: "authentik"
    user: "authentik"

server:
  tolerations:
    - key: node.kubernetes.io/disk-pressure
      operator: Exists
      effect: NoSchedule
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secret-key
          key: secret-key
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-pg-app
          key: password
  volumes:
    - name: branding-blueprint
      configMap:
        name: authentik-branding-blueprint
  volumeMounts:
    - name: branding-blueprint
      mountPath: /blueprints/custom/branding.yaml
      subPath: branding.yaml
      readOnly: true

worker:
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m
  tolerations:
    - key: node.kubernetes.io/disk-pressure
      operator: Exists
      effect: NoSchedule
  env:
    - name: AUTHENTIK_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: authentik-secret-key
          key: secret-key
    - name: AUTHENTIK_POSTGRESQL__PASSWORD
      valueFrom:
        secretKeyRef:
          name: authentik-pg-app
          key: password
