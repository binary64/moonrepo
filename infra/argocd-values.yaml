## ArgoCD Helm Values
## Resource limits to prevent OOM and ensure stability

## Cluster-wide ignoreDifferences for resources that are mutated by controllers.
## Istio ambient mode writes status conditions to HTTPRoute and Gateway resources
## on every reconcile, causing ArgoCD to detect spurious drift and re-sync every
## 1-3 seconds (burning ~841m CPU and 1.3GB RAM on the NUC).
## See: https://argo-cd.readthedocs.io/en/stable/user-guide/diffing/#system-level-configuration
configs:
  cm:
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_HTTPRoute: |
      jsonPointers:
        - /status
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_Gateway: |
      jsonPointers:
        - /status
    resource.customizations.ignoreDifferences.gateway.networking.k8s.io_GatewayClass: |
      jsonPointers:
        - /status

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

server:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

controller:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

dex:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
